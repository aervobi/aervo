<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aervo – Inventory Dashboard</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e5e7eb;
        min-height: 100vh;
      }
      /* NAV */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: rgba(5, 8, 23, 0.96);
        backdrop-filter: blur(14px);
        z-index: 100;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 0;
        min-width: 140px;
        flex-shrink: 0;
      }
      .nav-center {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .nav-tab {
        padding: 8px 16px;
        border-radius: 8px;
        color: #9ca7d6;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
        border: 1px solid transparent;
      }
      .nav-tab:hover {
        background: rgba(168, 85, 247, 0.08);
        color: #e5ecff;
      }
      .nav-tab.active {
        background: rgba(168, 85, 247, 0.15);
        border-color: rgba(168, 85, 247, 0.3);
        color: #e5ecff;
      }
      .nav-right {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .shop-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(168, 85, 247, 0.15);
        color: #d8b4fe;
        font-size: 11px;
        border: 1px solid rgba(168, 85, 247, 0.3);
      }
      .btn-logout {
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid #3a4a7c;
        background: transparent;
        color: #dfe7ff;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .btn-logout:hover {
        background: #1a2237;
      }
      .mobile-menu-btn {
        display: none;
        background: none;
        border: none;
        color: #e5ecff;
        font-size: 24px;
        cursor: pointer;
        padding: 8px;
      }
      .mobile-menu {
        display: none;
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        background: rgba(5, 8, 23, 0.98);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        z-index: 99;
        padding: 16px;
      }
      .mobile-menu.active {
        display: block;
      }
      .mobile-nav-tab {
        padding: 14px 16px;
        font-size: 14px;
        color: #9ca7d6;
        cursor: pointer;
        border-radius: 8px;
        margin-bottom: 4px;
      }
      .mobile-nav-tab.active {
        background: rgba(168, 85, 247, 0.15);
        color: #d8b4fe;
      }

      /* LAYOUT */
      .container {
        padding: 88px 32px 48px;
        max-width: 1600px;
        margin: 0 auto;
      }
      .welcome {
        margin-bottom: 32px;
      }
      .welcome h1 {
        font-size: 32px;
        margin: 0 0 8px;
        color: #f9fafb;
      }
      .welcome p {
        margin: 0;
        font-size: 15px;
        color: #9ca7d6;
      }

      /* AI BANNER */
      .ai-banner {
        background: linear-gradient(135deg, #3b0764 0%, #7c3aed 100%);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 32px;
        border: 1px solid rgba(124, 58, 237, 0.3);
        box-shadow: 0 10px 40px rgba(124, 58, 237, 0.2);
      }
      .ai-banner-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .ai-icon {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .ai-banner h2 {
        font-size: 18px;
        color: white;
        margin: 0;
      }
      .insight-item {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 14px;
        line-height: 1.6;
      }
      .insight-item:last-child {
        margin-bottom: 0;
      }
      .insight-priority {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        margin-right: 8px;
      }
      .priority-high {
        background: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
      }
      .priority-medium {
        background: rgba(251, 191, 36, 0.2);
        color: #fde047;
      }
      .priority-low {
        background: rgba(34, 197, 94, 0.2);
        color: #86efac;
      }

      /* GRIDS */
      .grid-4 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }

      /* CARDS */
      .card {
        background: radial-gradient(circle at top left, #1e293b, #0f172a);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      .card h3 {
        font-size: 14px;
        color: #9ca7d6;
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .stat-large {
        font-size: 42px;
        font-weight: 700;
        color: #a855f7;
        margin: 8px 0;
        line-height: 1;
      }
      .stat-large.green {
        color: #34d399;
      }
      .stat-large.blue {
        color: #60a5fa;
      }
      .stat-large.yellow {
        color: #fbbf24;
      }
      .stat-large.red {
        color: #ef4444;
      }
      .stat-change {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        padding: 4px 8px;
        border-radius: 6px;
        margin-top: 8px;
      }
      .stat-change.positive {
        background: rgba(34, 197, 94, 0.15);
        color: #6ee7b7;
      }
      .stat-change.negative {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
      }
      .stat-label {
        font-size: 13px;
        color: #64748b;
        margin-top: 4px;
      }

      /* TABLE */
      .data-table {
        width: 100%;
        border-collapse: collapse;
      }
      .data-table th {
        text-align: left;
        padding: 12px;
        font-size: 12px;
        color: #9ca7d6;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        font-weight: 600;
      }
      .data-table td {
        padding: 12px;
        font-size: 13px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      }
      .data-table tr:hover {
        background: rgba(168, 85, 247, 0.05);
      }
      .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 12px;
        margin: -24px;
        margin-top: 16px;
      }

      /* BADGES */
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge-green {
        background: rgba(52, 211, 153, 0.15);
        color: #6ee7b7;
        border: 1px solid rgba(52, 211, 153, 0.3);
      }
      .badge-yellow {
        background: rgba(251, 191, 36, 0.15);
        color: #fde047;
        border: 1px solid rgba(251, 191, 36, 0.3);
      }
      .badge-red {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .badge-blue {
        background: rgba(96, 165, 250, 0.15);
        color: #93c5fd;
        border: 1px solid rgba(96, 165, 250, 0.3);
      }
      .badge-purple {
        background: rgba(168, 85, 247, 0.15);
        color: #d8b4fe;
        border: 1px solid rgba(168, 85, 247, 0.3);
      }

      /* LOADING / EMPTY */
      .loading {
        text-align: center;
        padding: 60px 20px;
        color: #9ca7d6;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(148, 163, 184, 0.2);
        border-top-color: #a855f7;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #64748b;
        font-size: 14px;
      }

      /* CHAT */
      .chat-container {
        padding: 0;
        height: 360px;
        display: flex;
        flex-direction: column;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 16px;
        padding-right: 4px;
      }
      .chat-message {
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 10px;
        font-size: 14px;
        line-height: 1.5;
      }
      .chat-message.user {
        background: rgba(168, 85, 247, 0.2);
        border: 1px solid rgba(168, 85, 247, 0.3);
      }
      .chat-message.ai {
        background: rgba(148, 163, 184, 0.1);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      .chat-input-wrapper {
        display: flex;
        gap: 10px;
      }
      .chat-input {
        flex: 1;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(15, 23, 42, 0.6);
        color: #e5ecff;
        font-size: 16px;
        min-height: 44px;
      }
      .chat-input:focus {
        outline: none;
        border-color: #a855f7;
      }
      .btn-send {
        padding: 12px 20px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        min-height: 44px;
        min-width: 44px;
      }

      /* MODAL */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal {
        background: #0f172a;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        padding: 32px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
      }
      .modal h3 {
        font-size: 18px;
        color: #f9fafb;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        color: #9ca7d6;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .form-input {
        width: 100%;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.8);
        color: #e5ecff;
        font-size: 14px;
        font-family: inherit;
      }
      .form-input:focus {
        outline: none;
        border-color: #a855f7;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .modal-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 24px;
      }
      .btn-cancel {
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: transparent;
        color: #9ca7d6;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-save {
        padding: 10px 20px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        color: white;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-add {
        padding: 8px 16px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        color: white;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      /* FILTER BUTTONS */
      .filter-btn {
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: transparent;
        color: #9ca7d6;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-btn:hover {
        background: rgba(148, 163, 184, 0.1);
        color: #e5ecff;
      }
      .filter-btn.active-filter {
        background: rgba(168, 85, 247, 0.15);
        border-color: rgba(168, 85, 247, 0.4);
        color: #d8b4fe;
      }

      /* HEALTH SCORE */
      .score-ring-wrap {
        position: relative;
        width: 100px;
        height: 100px;
        margin: 0 auto 12px;
      }
      .score-ring-wrap svg {
        transform: rotate(-90deg);
      }
      .score-ring-bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.06);
        stroke-width: 8;
      }
      .score-ring-fill {
        fill: none;
        stroke: #23e6a8;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-dasharray: 264;
        stroke-dashoffset: 264;
        transition: stroke-dashoffset 1.2s ease;
      }
      .score-number {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 800;
        color: #23e6a8;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .nav-center {
          display: none;
        }
        .mobile-menu-btn {
          display: block;
        }
        .container {
          padding: 80px 16px 32px;
        }
        .welcome h1 {
          font-size: 22px;
        }
        .stat-large {
          font-size: 28px;
        }
        .grid-4,
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .modal {
          margin: 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">
      <a href="/dashboard" class="nav-brand" style="text-decoration: none">
        <img
          src="/assets/images/logo.png"
          alt="Aervo"
          style="height: 38px; width: auto"
        />
      </a>
      <div class="nav-center">
        <div class="nav-tab active" data-view="overview">Overview</div>
        <div class="nav-tab" data-view="products">Products</div>
        <div class="nav-tab" data-view="sales">Sales</div>
        <div class="nav-tab" data-view="customers">Customers</div>
        <div class="nav-tab" data-view="expenses">Expenses</div>
      </div>
      <div class="nav-right">
        <div class="shop-badge" id="shopBadge">
          <span>●</span><span id="shopName">Manual IMS</span>
        </div>
        <a href="/reports" class="btn-logout" style="text-decoration: none"
          >📊 Reports</a
        >
        <a href="/intelligence" class="btn-logout" style="text-decoration: none"
          >🧠 Intelligence</a
        >
        <a href="/integrations" class="btn-logout" style="text-decoration: none"
          >⚙️ Integrations</a
        >
        <a href="/settings" class="btn-logout" style="text-decoration: none"
          >👤 Settings</a
        >
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <button class="btn-logout" id="logoutBtn">Log out</button>
      </div>
    </nav>

    <!-- MOBILE MENU -->
    <div class="mobile-menu" id="mobileMenu">
      <div class="mobile-nav-tab active" data-view="overview">📊 Overview</div>
      <div class="mobile-nav-tab" data-view="products">📦 Products</div>
      <div class="mobile-nav-tab" data-view="sales">🧾 Sales</div>
      <div class="mobile-nav-tab" data-view="customers">👥 Customers</div>
      <div class="mobile-nav-tab" data-view="expenses">💸 Expenses</div>
    </div>

    <div class="container">
      <div id="content">
        <div class="loading">
          <div class="spinner"></div>
          <div>Loading your dashboard...</div>
        </div>
      </div>
    </div>

    <!-- MODAL: Add Product -->
    <div class="modal-overlay" id="productModal">
      <div class="modal">
        <h3 id="productModalTitle">Add Product</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Product Name *</label>
            <input class="form-input" id="pName" placeholder="e.g. Haircut" />
          </div>
          <div class="form-group">
            <label>SKU</label>
            <input class="form-input" id="pSku" placeholder="e.g. HC-001" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <input
              class="form-input"
              id="pCategory"
              placeholder="e.g. Services"
            />
          </div>
          <div class="form-group">
            <label>Unit</label>
            <input
              class="form-input"
              id="pUnit"
              placeholder="unit / hour / kg"
              value="unit"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Sale Price ($) *</label>
            <input
              class="form-input"
              id="pSalePrice"
              type="number"
              placeholder="0.00"
              step="0.01"
            />
          </div>
          <div class="form-group">
            <label>Cost Price ($)</label>
            <input
              class="form-input"
              id="pCostPrice"
              type="number"
              placeholder="0.00"
              step="0.01"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Initial Stock</label>
            <input
              class="form-input"
              id="pInitQty"
              type="number"
              placeholder="0"
            />
          </div>
          <div class="form-group">
            <label>Low Stock Alert At</label>
            <input
              class="form-input"
              id="pLowStock"
              type="number"
              placeholder="10"
            />
          </div>
        </div>
        <div class="form-group">
          <label
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              cursor: pointer;
            "
          >
            <input
              type="checkbox"
              id="pIsService"
              style="width: 16px; height: 16px"
            />
            <span>This is a service (no inventory tracking)</span>
          </label>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal('productModal')">
            Cancel
          </button>
          <button class="btn-save" onclick="saveProduct()">Save Product</button>
        </div>
      </div>
    </div>

    <!-- MODAL: Log Sale -->
    <div class="modal-overlay" id="saleModal">
      <div class="modal" style="max-width: 560px">
        <h3>Log a Sale</h3>
        <div class="form-group">
          <label>Customer (optional)</label>
          <select class="form-input" id="sCustomer">
            <option value="">-- Walk-in / No customer --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Payment Method</label>
          <select class="form-input" id="sPayment">
            <option value="cash">Cash</option>
            <option value="card">Card</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input class="form-input" id="sSaleDate" type="datetime-local" />
        </div>
        <div class="form-group">
          <label>Items</label>
          <div id="saleItems"></div>
          <button
            class="btn-add"
            style="margin-top: 10px"
            onclick="addSaleItemRow()"
          >
            + Add Item
          </button>
        </div>
        <div
          style="
            margin-top: 12px;
            padding: 12px;
            background: rgba(168, 85, 247, 0.08);
            border-radius: 10px;
            border: 1px solid rgba(168, 85, 247, 0.2);
          "
        >
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 14px;
            "
          >
            <span style="color: #9ca7d6">Total</span>
            <span style="color: #d8b4fe; font-weight: 700" id="saleTotalDisplay"
              >$0.00</span
            >
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal('saleModal')">
            Cancel
          </button>
          <button class="btn-save" onclick="saveSale()">Log Sale</button>
        </div>
      </div>
    </div>

    <!-- MODAL: Add Customer -->
    <div class="modal-overlay" id="customerModal">
      <div class="modal">
        <h3>Add Customer</h3>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input class="form-input" id="cFirst" placeholder="Jane" />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input class="form-input" id="cLast" placeholder="Doe" />
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input
            class="form-input"
            id="cEmail"
            type="email"
            placeholder="jane@example.com"
          />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input
            class="form-input"
            id="cPhone"
            placeholder="+1 (555) 000-0000"
          />
        </div>
        <div class="form-group">
          <label>Notes</label>
          <input class="form-input" id="cNotes" placeholder="Any notes..." />
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal('customerModal')">
            Cancel
          </button>
          <button class="btn-save" onclick="saveCustomer()">
            Save Customer
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL: Add Expense -->
    <div class="modal-overlay" id="expenseModal">
      <div class="modal">
        <h3>Log Expense</h3>
        <div class="form-group">
          <label>Category *</label>
          <select class="form-input" id="eCategory">
            <option value="rent">Rent</option>
            <option value="supplies">Supplies</option>
            <option value="payroll">Payroll</option>
            <option value="utilities">Utilities</option>
            <option value="marketing">Marketing</option>
            <option value="equipment">Equipment</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount ($) *</label>
          <input
            class="form-input"
            id="eAmount"
            type="number"
            placeholder="0.00"
            step="0.01"
          />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input class="form-input" id="eDate" type="date" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <input
            class="form-input"
            id="eDesc"
            placeholder="Optional description..."
          />
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal('expenseModal')">
            Cancel
          </button>
          <button class="btn-save" onclick="saveExpense()">Log Expense</button>
        </div>
      </div>
    </div>

    <script>
      const BACKEND_URL = "https://api.aervoapp.com";
      const token = localStorage.getItem("aervo_token");
      if (!token) window.location.href = "/login";

      let currentView = "overview";
      let merchantId = null;
      let imsData = {
        products: [],
        sales: [],
        customers: [],
        expenses: [],
        summary: null,
      };

      // ── NAV ──────────────────────────────────────────────────────
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("aervo_token");
        localStorage.removeItem("aervo_user");
        window.location.href = "/login";
      });

      const mobileMenuBtn = document.getElementById("mobileMenuBtn");
      const mobileMenu = document.getElementById("mobileMenu");
      mobileMenuBtn.addEventListener("click", () =>
        mobileMenu.classList.toggle("active"),
      );

      document.querySelectorAll(".nav-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          currentView = tab.dataset.view;
          document
            .querySelectorAll(".nav-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          renderView(currentView);
        });
      });

      document.querySelectorAll(".mobile-nav-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          currentView = tab.dataset.view;
          document
            .querySelectorAll(".mobile-nav-tab,.nav-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          mobileMenu.classList.remove("active");
          renderView(currentView);
        });
      });

      // ── INIT ─────────────────────────────────────────────────────
      async function init() {
        try {
          const res = await fetch(`${BACKEND_URL}/api/user/me`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) {
            window.location.href = "/login";
            return;
          }
          const data = await res.json();
          merchantId = String(data.user.id);
          const firstName = (data.user.name || "").split(" ")[0] || "there";
          document.title = `Aervo – ${data.user.name || "IMS"} Dashboard`;

          await loadAllData();
          renderView("overview");
        } catch (err) {
          console.error("Init error:", err);
          document.getElementById("content").innerHTML =
            `<div class="empty-state" style="color:#fca5a5">Failed to load dashboard. Please refresh.</div>`;
        }
      }

      async function loadAllData() {
        const h = { Authorization: `Bearer ${token}` };
        const base = `${BACKEND_URL}/api/ims`;
        const [prodRes, salesRes, custRes, expRes, summRes] = await Promise.all(
          [
            fetch(`${base}/products?merchant_id=${merchantId}`, { headers: h }),
            fetch(`${base}/sales?merchant_id=${merchantId}`, { headers: h }),
            fetch(`${base}/customers?merchant_id=${merchantId}`, {
              headers: h,
            }),
            fetch(`${base}/expenses?merchant_id=${merchantId}`, { headers: h }),
            fetch(`${base}/analytics/summary?merchant_id=${merchantId}`, {
              headers: h,
            }),
          ],
        );
        imsData.products = prodRes.ok ? await prodRes.json() : [];
        imsData.sales = salesRes.ok ? await salesRes.json() : [];
        imsData.customers = custRes.ok ? await custRes.json() : [];
        imsData.expenses = expRes.ok ? await expRes.json() : [];
        imsData.summary = summRes.ok ? await summRes.json() : null;
      }

      // ── RENDER ROUTER ─────────────────────────────────────────────
      function renderView(view) {
        const el = document.getElementById("content");
        if (view === "overview") renderOverview(el);
        else if (view === "products") renderProducts(el);
        else if (view === "sales") renderSales(el);
        else if (view === "customers") renderCustomers(el);
        else if (view === "expenses") renderExpenses(el);
      }

      function fmt(n) {
        n = parseFloat(n) || 0;
        if (n >= 1000000) return "$" + (n / 1000000).toFixed(1) + "M";
        if (n >= 1000) return "$" + (n / 1000).toFixed(1) + "K";
        return "$" + n.toFixed(2);
      }
      function fmtDate(d) {
        return new Date(d).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      // ── OVERVIEW ─────────────────────────────────────────────────
      function renderOverview(el) {
        const s = imsData.summary || {};
        const revenue = parseFloat(s.total_revenue) || 0;
        const cogs = parseFloat(s.total_cogs) || 0;
        const grossProfit = parseFloat(s.gross_profit) || 0;
        const expenses = parseFloat(s.total_expenses) || 0;
        const netProfit = parseFloat(s.net_profit) || 0;
        const orders = parseInt(s.total_orders) || 0;
        const topProducts = s.top_products || [];

        const lowStock = imsData.products.filter(
          (p) =>
            p.quantity !== null &&
            parseFloat(p.quantity) <= parseFloat(p.low_stock_threshold || 10),
        );

        const insights = generateInsights(s, lowStock);

        el.innerHTML = `
          <div class="welcome">
            <h1 id="welcomeHeading">Your Business Overview 📦</h1>
            <p>Manual inventory & sales dashboard — all your data in one place.</p>
          </div>

          <div class="ai-banner">
            <div class="ai-banner-header">
              <div class="ai-icon">🤖</div>
              <h2>AI Insights</h2>
            </div>
            <div id="aiInsights">
              ${
                insights.length
                  ? insights
                      .map(
                        (i) => `
                <div class="insight-item">
                  <span class="insight-priority priority-${i.priority}">${i.label}</span>
                  <strong>${i.title}</strong> — ${i.desc}
                </div>`,
                      )
                      .join("")
                  : `<div class="insight-item">Add products and log some sales to get AI-powered insights.</div>`
              }
            </div>
          </div>

          <div class="grid-4">
            <div class="card">
              <h3>Total Revenue</h3>
              <div class="stat-large green">${fmt(revenue)}</div>
              <div class="stat-label">${orders} sales logged</div>
            </div>
            <div class="card">
              <h3>Gross Profit</h3>
              <div class="stat-large ${grossProfit >= 0 ? "green" : "red"}">${fmt(grossProfit)}</div>
              <div class="stat-label">Revenue minus cost of goods</div>
            </div>
            <div class="card">
              <h3>Net Profit</h3>
              <div class="stat-large ${netProfit >= 0 ? "green" : "red"}">${fmt(netProfit)}</div>
              <div class="stat-label">After all expenses</div>
            </div>
            <div class="card">
              <h3>Total Expenses</h3>
              <div class="stat-large yellow">${fmt(expenses)}</div>
              <div class="stat-label">${imsData.expenses.length} expense entries</div>
            </div>
          </div>

          <div class="grid-3">
            <div class="card">
              <h3>Products</h3>
              <div class="stat-large blue">${imsData.products.length}</div>
              <div class="stat-label">${lowStock.length > 0 ? `⚠️ ${lowStock.length} low stock` : "All stock levels OK"}</div>
            </div>
            <div class="card">
              <h3>Customers</h3>
              <div class="stat-large">${imsData.customers.length}</div>
              <div class="stat-label">Total registered customers</div>
            </div>
            <div class="card">
              <h3>Avg Sale Value</h3>
              <div class="stat-large blue">${orders > 0 ? fmt(revenue / orders) : "$0.00"}</div>
              <div class="stat-label">Per transaction</div>
            </div>
          </div>

          <div class="grid-2">
            ${
              topProducts.length
                ? `
            <div class="card">
              <h3>Top Products by Revenue</h3>
              <div class="table-wrapper">
                <table class="data-table">
                  <thead><tr><th>Product</th><th>Units Sold</th><th>Revenue</th></tr></thead>
                  <tbody>
                    ${topProducts
                      .map(
                        (p) => `
                      <tr>
                        <td style="color:#e5ecff;font-weight:500">${p.name}</td>
                        <td>${parseFloat(p.units_sold).toFixed(0)}</td>
                        <td style="color:#34d399">${fmt(p.revenue)}</td>
                      </tr>`,
                      )
                      .join("")}
                  </tbody>
                </table>
              </div>
            </div>`
                : ""
            }

            ${
              lowStock.length
                ? `
            <div class="card">
              <h3>⚠️ Low Stock Alerts</h3>
              <div class="table-wrapper">
                <table class="data-table">
                  <thead><tr><th>Product</th><th>Stock</th><th>Threshold</th></tr></thead>
                  <tbody>
                    ${lowStock
                      .map(
                        (p) => `
                      <tr>
                        <td style="color:#e5ecff;font-weight:500">${p.name}</td>
                        <td><span class="badge badge-red">${parseFloat(p.quantity).toFixed(0)}</span></td>
                        <td style="color:#64748b">${p.low_stock_threshold}</td>
                      </tr>`,
                      )
                      .join("")}
                  </tbody>
                </table>
              </div>
            </div>`
                : ""
            }
          </div>

          <div class="grid-2">
            <div class="card">
              <h3>Recent Sales</h3>
              <div class="table-wrapper">
                <table class="data-table">
                  <thead><tr><th>Date</th><th>Customer</th><th>Payment</th><th>Total</th></tr></thead>
                  <tbody>
                    ${
                      imsData.sales
                        .slice(0, 5)
                        .map(
                          (s) => `
                      <tr>
                        <td style="color:#64748b">${fmtDate(s.sale_date)}</td>
                        <td>${s.first_name ? s.first_name + " " + s.last_name : "Walk-in"}</td>
                        <td><span class="badge badge-purple">${s.payment_method}</span></td>
                        <td style="color:#34d399;font-weight:600">${fmt(s.total_amount)}</td>
                      </tr>`,
                        )
                        .join("") ||
                      `<tr><td colspan="4" class="empty-state">No sales yet</td></tr>`
                    }
                  </tbody>
                </table>
              </div>
            </div>

            <div class="card">
              <h3>🤖 Ask Aervo AI</h3>
              <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                  <div class="chat-message ai">👋 Hi! I'm <strong>Aervo</strong>, your AI business co-pilot.<br><br>
                    • <span style="color:#d8b4fe;cursor:pointer" onclick="askSuggestion(this)">What are my best-selling products?</span><br>
                    • <span style="color:#d8b4fe;cursor:pointer" onclick="askSuggestion(this)">How can I improve my profit margin?</span><br>
                    • <span style="color:#d8b4fe;cursor:pointer" onclick="askSuggestion(this)">Which items should I reorder soon?</span>
                  </div>
                </div>
                <div class="chat-input-wrapper">
                  <input type="text" class="chat-input" id="chatInput" placeholder="Ask anything about your business..." />
                  <button class="btn-send" onclick="sendMessage()">Send</button>
                </div>
              </div>
            </div>
          </div>
        `;

        document
          .getElementById("chatInput")
          ?.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
          });
      }

      function generateInsights(s, lowStock) {
        const insights = [];
        const net = parseFloat(s.net_profit) || 0;
        const revenue = parseFloat(s.total_revenue) || 0;
        const expenses = parseFloat(s.total_expenses) || 0;

        if (lowStock.length > 0) {
          insights.push({
            priority: "high",
            label: "ALERT",
            title: "Low Stock Warning",
            desc: `${lowStock.map((p) => p.name).join(", ")} ${lowStock.length === 1 ? "is" : "are"} running low and need restocking.`,
          });
        }
        if (revenue > 0 && expenses / revenue > 0.7) {
          insights.push({
            priority: "high",
            label: "ALERT",
            title: "High Expense Ratio",
            desc: `Expenses are ${Math.round((expenses / revenue) * 100)}% of revenue. Look for areas to reduce costs.`,
          });
        }
        if (net > 0) {
          insights.push({
            priority: "low",
            label: "INSIGHT",
            title: "Business is Profitable",
            desc: `Net profit of ${fmt(net)} — keep monitoring expenses to maintain healthy margins.`,
          });
        }
        if (net < 0) {
          insights.push({
            priority: "high",
            label: "ALERT",
            title: "Operating at a Loss",
            desc: `Net loss of ${fmt(Math.abs(net))}. Review expenses and consider pricing adjustments.`,
          });
        }
        if ((s.top_products || []).length > 0) {
          const top = s.top_products[0];
          insights.push({
            priority: "low",
            label: "INSIGHT",
            title: `Top Performer: ${top.name}`,
            desc: `Your best product generated ${fmt(top.revenue)} in revenue. Consider promoting it further.`,
          });
        }
        return insights.slice(0, 3);
      }

      // ── PRODUCTS ─────────────────────────────────────────────────
      function renderProducts(el) {
        el.innerHTML = `
          <div class="welcome" style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <h1>Products & Inventory 📦</h1>
              <p>Manage your product catalog and stock levels.</p>
            </div>
            <button class="btn-add" onclick="openAddProduct()">+ Add Product</button>
          </div>

          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
              <h3 style="margin:0">${imsData.products.length} Products</h3>
            </div>
            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Product</th><th>Category</th><th>Sale Price</th>
                    <th>Cost</th><th>Stock</th><th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  ${
                    imsData.products.length
                      ? imsData.products
                          .map((p) => {
                            const qty = parseFloat(p.quantity) || 0;
                            const threshold =
                              parseFloat(p.low_stock_threshold) || 10;
                            const stockBadge = p.is_service
                              ? `<span class="badge badge-blue">Service</span>`
                              : qty <= 0
                                ? `<span class="badge badge-red">Out of stock</span>`
                                : qty <= threshold
                                  ? `<span class="badge badge-yellow">${qty} — Low</span>`
                                  : `<span class="badge badge-green">${qty}</span>`;
                            return `
                      <tr>
                        <td style="color:#e5ecff;font-weight:500">${p.name}${p.sku ? `<div style="font-size:11px;color:#64748b">${p.sku}</div>` : ""}</td>
                        <td style="color:#9ca7d6">${p.category || "—"}</td>
                        <td style="color:#34d399;font-weight:600">${fmt(p.sale_price)}</td>
                        <td style="color:#9ca7d6">${fmt(p.cost_price)}</td>
                        <td>${stockBadge}</td>
                        <td>
                          ${!p.is_service ? `<button class="filter-btn" onclick="adjustStock(${p.id}, '${p.name}')">Adjust Stock</button>` : ""}
                        </td>
                      </tr>`;
                          })
                          .join("")
                      : `<tr><td colspan="6" class="empty-state">No products yet. Add your first product above.</td></tr>`
                  }
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      // ── SALES ────────────────────────────────────────────────────
      function renderSales(el) {
        el.innerHTML = `
          <div class="welcome" style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <h1>Sales 🧾</h1>
              <p>Log and review all your transactions.</p>
            </div>
            <button class="btn-add" onclick="openLogSale()">+ Log Sale</button>
          </div>

          <div class="card">
            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr><th>Date</th><th>Customer</th><th>Items</th><th>Payment</th><th>Revenue</th><th>Cost</th><th>Profit</th></tr>
                </thead>
                <tbody>
                  ${
                    imsData.sales.length
                      ? imsData.sales
                          .map((s) => {
                            const profit =
                              parseFloat(s.total_amount) -
                              parseFloat(s.total_cost);
                            const items =
                              Array.isArray(s.items) && s.items[0]
                                ? s.items
                                    .map((i) => i.product_name)
                                    .filter(Boolean)
                                    .join(", ")
                                : "—";
                            return `
                      <tr>
                        <td style="color:#64748b">${fmtDate(s.sale_date)}</td>
                        <td>${s.first_name ? s.first_name + " " + s.last_name : "<span style='color:#64748b'>Walk-in</span>"}</td>
                        <td style="color:#9ca7d6;font-size:12px;max-width:200px">${items}</td>
                        <td><span class="badge badge-purple">${s.payment_method}</span></td>
                        <td style="color:#34d399;font-weight:600">${fmt(s.total_amount)}</td>
                        <td style="color:#9ca7d6">${fmt(s.total_cost)}</td>
                        <td style="color:${profit >= 0 ? "#34d399" : "#fca5a5"};font-weight:600">${fmt(profit)}</td>
                      </tr>`;
                          })
                          .join("")
                      : `<tr><td colspan="7" class="empty-state">No sales yet. Log your first sale above.</td></tr>`
                  }
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      // ── CUSTOMERS ────────────────────────────────────────────────
      function renderCustomers(el) {
        el.innerHTML = `
          <div class="welcome" style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <h1>Customers 👥</h1>
              <p>View and manage your customer base.</p>
            </div>
            <button class="btn-add" onclick="openAddCustomer()">+ Add Customer</button>
          </div>

          <div class="card">
            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr><th>Name</th><th>Email</th><th>Phone</th><th>Orders</th><th>Total Spent</th><th>Since</th></tr>
                </thead>
                <tbody>
                  ${
                    imsData.customers.length
                      ? imsData.customers
                          .map(
                            (c) => `
                    <tr>
                      <td style="color:#e5ecff;font-weight:500">${[c.first_name, c.last_name].filter(Boolean).join(" ") || "—"}</td>
                      <td style="color:#9ca7d6">${c.email || "—"}</td>
                      <td style="color:#9ca7d6">${c.phone || "—"}</td>
                      <td><span class="badge badge-purple">${c.total_orders || 0}</span></td>
                      <td style="color:#34d399;font-weight:600">${fmt(c.total_spent)}</td>
                      <td style="color:#64748b">${fmtDate(c.created_at)}</td>
                    </tr>`,
                          )
                          .join("")
                      : `<tr><td colspan="6" class="empty-state">No customers yet. Add your first customer above.</td></tr>`
                  }
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      // ── EXPENSES ─────────────────────────────────────────────────
      function renderExpenses(el) {
        const totalExp = imsData.expenses.reduce(
          (sum, e) => sum + parseFloat(e.amount),
          0,
        );
        const byCategory = {};
        imsData.expenses.forEach((e) => {
          byCategory[e.category] =
            (byCategory[e.category] || 0) + parseFloat(e.amount);
        });

        el.innerHTML = `
          <div class="welcome" style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <h1>Expenses 💸</h1>
              <p>Track your business costs and overhead.</p>
            </div>
            <button class="btn-add" onclick="openAddExpense()">+ Log Expense</button>
          </div>

          <div class="grid-4" style="margin-bottom:24px">
            <div class="card">
              <h3>Total Expenses</h3>
              <div class="stat-large yellow">${fmt(totalExp)}</div>
              <div class="stat-label">${imsData.expenses.length} entries</div>
            </div>
            ${Object.entries(byCategory)
              .slice(0, 3)
              .map(
                ([cat, amt]) => `
              <div class="card">
                <h3>${cat.charAt(0).toUpperCase() + cat.slice(1)}</h3>
                <div class="stat-large yellow">${fmt(amt)}</div>
                <div class="stat-label">${Math.round((amt / totalExp) * 100)}% of total</div>
              </div>`,
              )
              .join("")}
          </div>

          <div class="card">
            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th></tr>
                </thead>
                <tbody>
                  ${
                    imsData.expenses.length
                      ? imsData.expenses
                          .map(
                            (e) => `
                    <tr>
                      <td style="color:#64748b">${fmtDate(e.expense_date)}</td>
                      <td><span class="badge badge-yellow">${e.category}</span></td>
                      <td style="color:#9ca7d6">${e.description || "—"}</td>
                      <td style="color:#fbbf24;font-weight:600">${fmt(e.amount)}</td>
                    </tr>`,
                          )
                          .join("")
                      : `<tr><td colspan="4" class="empty-state">No expenses logged yet.</td></tr>`
                  }
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      // ── MODALS ───────────────────────────────────────────────────
      function openModal(id) {
        document.getElementById(id).classList.add("active");
      }
      function closeModal(id) {
        document.getElementById(id).classList.remove("active");
      }

      function openAddProduct() {
        document.getElementById("pName").value = "";
        document.getElementById("pSku").value = "";
        document.getElementById("pCategory").value = "";
        document.getElementById("pUnit").value = "unit";
        document.getElementById("pSalePrice").value = "";
        document.getElementById("pCostPrice").value = "";
        document.getElementById("pInitQty").value = "";
        document.getElementById("pLowStock").value = "10";
        document.getElementById("pIsService").checked = false;
        openModal("productModal");
      }

      async function saveProduct() {
        const name = document.getElementById("pName").value.trim();
        const sale_price = document.getElementById("pSalePrice").value;
        if (!name || !sale_price) {
          alert("Product name and sale price are required.");
          return;
        }
        try {
          const res = await fetch(`${BACKEND_URL}/api/ims/products`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              merchant_id: merchantId,
              name,
              sku: document.getElementById("pSku").value,
              category: document.getElementById("pCategory").value,
              unit: document.getElementById("pUnit").value || "unit",
              sale_price: parseFloat(sale_price),
              cost_price:
                parseFloat(document.getElementById("pCostPrice").value) || 0,
              initial_quantity:
                parseFloat(document.getElementById("pInitQty").value) || 0,
              low_stock_threshold:
                parseFloat(document.getElementById("pLowStock").value) || 10,
              is_service: document.getElementById("pIsService").checked,
            }),
          });
          if (!res.ok) throw new Error("Failed");
          closeModal("productModal");
          await loadAllData();
          renderView("products");
        } catch (err) {
          alert("Error saving product. Please try again.");
        }
      }

      function adjustStock(productId, productName) {
        const adjustment = prompt(
          `Adjust stock for "${productName}".\nEnter a positive number to add stock, negative to remove (e.g. 10 or -5):`,
        );
        if (adjustment === null) return;
        const num = parseFloat(adjustment);
        if (isNaN(num)) {
          alert("Please enter a valid number.");
          return;
        }
        const reason = num > 0 ? "restock" : "writeoff";
        fetch(`${BACKEND_URL}/api/ims/inventory/adjust`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({
            merchant_id: merchantId,
            product_id: productId,
            adjustment: num,
            reason,
          }),
        }).then(async () => {
          await loadAllData();
          renderView("products");
        });
      }

      // Sale modal
      let saleItemRows = [];

      function openLogSale() {
        saleItemRows = [];
        document.getElementById("sCustomer").innerHTML =
          `<option value="">-- Walk-in / No customer --</option>` +
          imsData.customers
            .map(
              (c) =>
                `<option value="${c.id}">${[c.first_name, c.last_name].filter(Boolean).join(" ")}</option>`,
            )
            .join("");
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById("sSaleDate").value = now
          .toISOString()
          .slice(0, 16);
        document.getElementById("saleItems").innerHTML = "";
        document.getElementById("saleTotalDisplay").textContent = "$0.00";
        addSaleItemRow();
        openModal("saleModal");
      }

      function addSaleItemRow() {
        const idx = saleItemRows.length;
        saleItemRows.push({});
        const div = document.createElement("div");
        div.style.cssText =
          "display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:8px;align-items:center";
        div.innerHTML = `
          <select class="form-input" id="sItem_${idx}_prod" onchange="updateSaleRow(${idx})">
            <option value="">Select product...</option>
            ${imsData.products.map((p) => `<option value="${p.id}" data-price="${p.sale_price}" data-cost="${p.cost_price}">${p.name} — ${fmt(p.sale_price)}</option>`).join("")}
          </select>
          <input class="form-input" id="sItem_${idx}_qty" type="number" placeholder="Qty" value="1" min="0.01" step="any" onchange="updateSaleRow(${idx})" />
          <span id="sItem_${idx}_total" style="color:#d8b4fe;font-size:13px;text-align:right">$0.00</span>
        `;
        document.getElementById("saleItems").appendChild(div);
      }

      function updateSaleRow(idx) {
        const sel = document.getElementById(`sItem_${idx}_prod`);
        const qty =
          parseFloat(document.getElementById(`sItem_${idx}_qty`).value) || 0;
        const opt = sel.options[sel.selectedIndex];
        const price = parseFloat(opt?.dataset?.price) || 0;
        const cost = parseFloat(opt?.dataset?.cost) || 0;
        const total = price * qty;
        document.getElementById(`sItem_${idx}_total`).textContent = fmt(total);
        saleItemRows[idx] = {
          product_id: sel.value,
          quantity: qty,
          unit_price: price,
          unit_cost: cost,
        };
        updateSaleTotal();
      }

      function updateSaleTotal() {
        const total = saleItemRows.reduce(
          (sum, r) => sum + (r.unit_price || 0) * (r.quantity || 0),
          0,
        );
        document.getElementById("saleTotalDisplay").textContent = fmt(total);
      }

      async function saveSale() {
        const items = saleItemRows.filter(
          (r) => r.product_id && r.quantity > 0,
        );
        if (!items.length) {
          alert("Add at least one item.");
          return;
        }
        try {
          const res = await fetch(`${BACKEND_URL}/api/ims/sales`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              merchant_id: merchantId,
              customer_id: document.getElementById("sCustomer").value || null,
              payment_method: document.getElementById("sPayment").value,
              sale_date: document.getElementById("sSaleDate").value,
              items,
            }),
          });
          if (!res.ok) throw new Error("Failed");
          closeModal("saleModal");
          await loadAllData();
          renderView("sales");
        } catch (err) {
          alert("Error logging sale. Please try again.");
        }
      }

      // Customer modal
      function openAddCustomer() {
        ["cFirst", "cLast", "cEmail", "cPhone", "cNotes"].forEach(
          (id) => (document.getElementById(id).value = ""),
        );
        openModal("customerModal");
      }

      async function saveCustomer() {
        try {
          const res = await fetch(`${BACKEND_URL}/api/ims/customers`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              merchant_id: merchantId,
              first_name: document.getElementById("cFirst").value,
              last_name: document.getElementById("cLast").value,
              email: document.getElementById("cEmail").value,
              phone: document.getElementById("cPhone").value,
              notes: document.getElementById("cNotes").value,
            }),
          });
          if (!res.ok) throw new Error("Failed");
          closeModal("customerModal");
          await loadAllData();
          renderView("customers");
        } catch (err) {
          alert("Error saving customer. Please try again.");
        }
      }

      // Expense modal
      function openAddExpense() {
        document.getElementById("eAmount").value = "";
        document.getElementById("eDesc").value = "";
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("eDate").value = today;
        openModal("expenseModal");
      }

      async function saveExpense() {
        const amount = document.getElementById("eAmount").value;
        if (!amount) {
          alert("Amount is required.");
          return;
        }
        try {
          const res = await fetch(`${BACKEND_URL}/api/ims/expenses`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              merchant_id: merchantId,
              category: document.getElementById("eCategory").value,
              amount: parseFloat(amount),
              expense_date: document.getElementById("eDate").value,
              description: document.getElementById("eDesc").value,
            }),
          });
          if (!res.ok) throw new Error("Failed");
          closeModal("expenseModal");
          await loadAllData();
          renderView("expenses");
        } catch (err) {
          alert("Error logging expense. Please try again.");
        }
      }

      // Close modals on overlay click
      document.querySelectorAll(".modal-overlay").forEach((overlay) => {
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) overlay.classList.remove("active");
        });
      });

      // ── CHAT ─────────────────────────────────────────────────────
      let isAIThinking = false;
      async function sendMessage() {
        if (isAIThinking) return;
        const input = document.getElementById("chatInput");
        const messages = document.getElementById("chatMessages");
        const message = input?.value?.trim();
        if (!message || !messages) return;
        const userMsg = document.createElement("div");
        userMsg.className = "chat-message user";
        userMsg.textContent = message;
        messages.appendChild(userMsg);
        input.value = "";
        messages.scrollTop = messages.scrollHeight;
        isAIThinking = true;
        const typingEl = document.createElement("div");
        typingEl.className = "chat-message ai";
        typingEl.id = "typingIndicator";
        typingEl.innerHTML =
          "<em style='color:#64748b'>Aervo is thinking...</em>";
        messages.appendChild(typingEl);
        input.disabled = true;
        try {
          const res = await fetch(`${BACKEND_URL}/api/ai/chat`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ message, merchantId, platform: "ims" }),
          });
          const data = await res.json();
          document.getElementById("typingIndicator")?.remove();
          const aiMsg = document.createElement("div");
          aiMsg.className = "chat-message ai";
          aiMsg.innerHTML = (data.reply || "Sorry, I couldn't respond.")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/\n/g, "<br>");
          messages.appendChild(aiMsg);
        } catch {
          document.getElementById("typingIndicator")?.remove();
          const errMsg = document.createElement("div");
          errMsg.className = "chat-message ai";
          errMsg.textContent =
            "Sorry, I had trouble responding. Please try again.";
          messages.appendChild(errMsg);
        }
        isAIThinking = false;
        input.disabled = false;
        input.focus();
        messages.scrollTop = messages.scrollHeight;
      }

      function askSuggestion(el) {
        const input = document.getElementById("chatInput");
        if (input) {
          input.value = el.textContent;
          sendMessage();
        }
      }

      init();
    </script>
  </body>
</html>
