<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aervo – Inventory Dashboard</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e5e7eb;
        min-height: 100vh;
      }
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: rgba(5, 8, 23, 0.96);
        backdrop-filter: blur(14px);
        z-index: 100;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .nav-brand {
        display: flex;
        align-items: center;
        min-width: 140px;
        flex-shrink: 0;
      }
      .nav-center {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .nav-tab {
        padding: 8px 16px;
        border-radius: 8px;
        color: #9ca7d6;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid transparent;
      }
      .nav-tab:hover {
        background: rgba(168, 85, 247, 0.08);
        color: #e5ecff;
      }
      .nav-tab.active {
        background: rgba(168, 85, 247, 0.15);
        border-color: rgba(168, 85, 247, 0.3);
        color: #e5ecff;
      }
      .nav-right {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .shop-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(168, 85, 247, 0.15);
        color: #d8b4fe;
        font-size: 11px;
        border: 1px solid rgba(168, 85, 247, 0.3);
      }
      .btn-logout {
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid #3a4a7c;
        background: transparent;
        color: #dfe7ff;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .btn-logout:hover {
        background: #1a2237;
      }
      .mobile-menu-btn {
        display: none;
        background: none;
        border: none;
        color: #e5ecff;
        font-size: 24px;
        cursor: pointer;
        padding: 8px;
      }
      .mobile-menu {
        display: none;
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        background: rgba(5, 8, 23, 0.98);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        z-index: 99;
        padding: 16px;
      }
      .mobile-menu.active {
        display: block;
      }
      .mobile-nav-tab {
        padding: 14px 16px;
        font-size: 14px;
        color: #9ca7d6;
        cursor: pointer;
        border-radius: 8px;
        margin-bottom: 4px;
      }
      .mobile-nav-tab.active {
        background: rgba(168, 85, 247, 0.15);
        color: #d8b4fe;
      }
      .container {
        padding: 88px 32px 48px;
        max-width: 1600px;
        margin: 0 auto;
      }
      .welcome {
        margin-bottom: 32px;
      }
      .welcome h1 {
        font-size: 32px;
        margin: 0 0 8px;
        color: #f9fafb;
      }
      .welcome p {
        margin: 0;
        font-size: 15px;
        color: #9ca7d6;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 32px;
      }
      .page-header h1 {
        font-size: 28px;
        color: #f9fafb;
        margin: 0 0 6px;
      }
      .page-header p {
        font-size: 14px;
        color: #9ca7d6;
        margin: 0;
      }
      .ai-banner {
        background: linear-gradient(135deg, #3b0764 0%, #7c3aed 100%);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 32px;
        border: 1px solid rgba(124, 58, 237, 0.3);
        box-shadow: 0 10px 40px rgba(124, 58, 237, 0.2);
      }
      .ai-banner-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .ai-icon {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .ai-banner h2 {
        font-size: 18px;
        color: white;
        margin: 0;
      }
      .insight-item {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 14px;
        line-height: 1.6;
      }
      .insight-item:last-child {
        margin-bottom: 0;
      }
      .insight-priority {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        margin-right: 8px;
      }
      .priority-high {
        background: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
      }
      .priority-medium {
        background: rgba(251, 191, 36, 0.2);
        color: #fde047;
      }
      .priority-low {
        background: rgba(34, 197, 94, 0.2);
        color: #86efac;
      }
      .grid-4 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }
      .card {
        background: radial-gradient(circle at top left, #1e293b, #0f172a);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      .card h3 {
        font-size: 14px;
        color: #9ca7d6;
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .stat-large {
        font-size: 42px;
        font-weight: 700;
        color: #a855f7;
        margin: 8px 0;
        line-height: 1;
      }
      .stat-large.green {
        color: #34d399;
      }
      .stat-large.blue {
        color: #60a5fa;
      }
      .stat-large.yellow {
        color: #fbbf24;
      }
      .stat-large.red {
        color: #ef4444;
      }
      .stat-label {
        font-size: 13px;
        color: #64748b;
        margin-top: 4px;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
      }
      .data-table th {
        text-align: left;
        padding: 12px;
        font-size: 12px;
        color: #9ca7d6;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        font-weight: 600;
      }
      .data-table td {
        padding: 12px;
        font-size: 13px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      }
      .data-table tr.clickable {
        cursor: pointer;
      }
      .data-table tr.clickable:hover {
        background: rgba(168, 85, 247, 0.08);
      }
      .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 12px;
        margin: -24px;
        margin-top: 16px;
      }
      .loading {
        text-align: center;
        padding: 60px 20px;
        color: #9ca7d6;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(148, 163, 184, 0.2);
        border-top-color: #a855f7;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #64748b;
        font-size: 14px;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge-green {
        background: rgba(52, 211, 153, 0.15);
        color: #6ee7b7;
        border: 1px solid rgba(52, 211, 153, 0.3);
      }
      .badge-yellow {
        background: rgba(251, 191, 36, 0.15);
        color: #fde047;
        border: 1px solid rgba(251, 191, 36, 0.3);
      }
      .badge-red {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .badge-blue {
        background: rgba(96, 165, 250, 0.15);
        color: #93c5fd;
        border: 1px solid rgba(96, 165, 250, 0.3);
      }
      .badge-purple {
        background: rgba(168, 85, 247, 0.15);
        color: #d8b4fe;
        border: 1px solid rgba(168, 85, 247, 0.3);
      }
      .chat-container {
        padding: 0;
        height: 360px;
        display: flex;
        flex-direction: column;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 16px;
        padding-right: 4px;
      }
      .chat-message {
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 10px;
        font-size: 14px;
        line-height: 1.5;
      }
      .chat-message.user {
        background: rgba(168, 85, 247, 0.2);
        border: 1px solid rgba(168, 85, 247, 0.3);
      }
      .chat-message.ai {
        background: rgba(148, 163, 184, 0.1);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      .chat-input-wrapper {
        display: flex;
        gap: 10px;
      }
      .chat-input {
        flex: 1;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(15, 23, 42, 0.6);
        color: #e5ecff;
        font-size: 16px;
        min-height: 44px;
      }
      .chat-input:focus {
        outline: none;
        border-color: #a855f7;
      }
      .btn-send {
        padding: 12px 20px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        min-height: 44px;
      }
      /* MODALS */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 200;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal {
        background: #0f172a;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        padding: 32px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal.modal-wide {
        max-width: 680px;
      }
      .modal.modal-xl {
        max-width: 820px;
      }
      .modal h3 {
        font-size: 18px;
        color: #f9fafb;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        color: #9ca7d6;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .form-input {
        width: 100%;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.8);
        color: #e5ecff;
        font-size: 14px;
        font-family: inherit;
      }
      .form-input:focus {
        outline: none;
        border-color: #a855f7;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .modal-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 24px;
      }
      .btn-cancel {
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: transparent;
        color: #9ca7d6;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-save {
        padding: 10px 20px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        color: white;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-danger {
        padding: 10px 20px;
        border-radius: 999px;
        border: none;
        background: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .btn-add {
        padding: 8px 16px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        color: white;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .filter-btn {
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: transparent;
        color: #9ca7d6;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-btn:hover {
        background: rgba(148, 163, 184, 0.1);
        color: #e5ecff;
      }
      .filter-btn.active-filter {
        background: rgba(168, 85, 247, 0.15);
        border-color: rgba(168, 85, 247, 0.4);
        color: #d8b4fe;
      }
      /* CUSTOMER PROFILE */
      .profile-hero {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 24px;
        background: rgba(168, 85, 247, 0.08);
        border-radius: 12px;
        border: 1px solid rgba(168, 85, 247, 0.2);
        margin-bottom: 24px;
      }
      .profile-avatar {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
      }
      .profile-name {
        font-size: 22px;
        font-weight: 700;
        color: #f9fafb;
        margin-bottom: 4px;
      }
      .profile-meta {
        font-size: 13px;
        color: #9ca7d6;
      }
      .profile-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 24px;
      }
      .profile-stat {
        background: rgba(15, 23, 42, 0.6);
        border-radius: 12px;
        padding: 16px;
        border: 1px solid rgba(148, 163, 184, 0.1);
        text-align: center;
      }
      .profile-stat-val {
        font-size: 24px;
        font-weight: 700;
        color: #a855f7;
      }
      .profile-stat-label {
        font-size: 11px;
        color: #64748b;
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .ai-insight-box {
        background: rgba(168, 85, 247, 0.08);
        border: 1px solid rgba(168, 85, 247, 0.2);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .ai-insight-box .ai-label {
        font-size: 11px;
        color: #a855f7;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .ai-insight-box p {
        font-size: 13px;
        color: #cbd5e1;
        line-height: 1.6;
      }
      /* PERIOD TABS */
      .period-tabs {
        display: flex;
        gap: 4px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 8px;
        padding: 4px;
        margin-bottom: 20px;
        width: fit-content;
      }
      .period-tab {
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        color: #64748b;
        cursor: pointer;
        border: none;
        background: transparent;
        transition: all 0.2s;
      }
      .period-tab.active {
        background: rgba(168, 85, 247, 0.2);
        color: #d8b4fe;
      }
      /* CHART CONTAINER */
      .chart-wrap {
        position: relative;
        height: 220px;
      }
      @media (max-width: 768px) {
        .nav-center {
          display: none;
        }
        .mobile-menu-btn {
          display: block;
        }
        .container {
          padding: 80px 16px 32px;
        }
        .welcome h1 {
          font-size: 22px;
        }
        .stat-large {
          font-size: 28px;
        }
        .grid-4,
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .modal {
          padding: 20px;
        }
        .profile-stats {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a href="/dashboard" class="nav-brand" style="text-decoration: none">
        <img
          src="/assets/images/logo.png"
          alt="Aervo"
          style="height: 38px; width: auto"
        />
      </a>
      <div class="nav-center">
        <div class="nav-tab active" data-view="overview">Overview</div>
        <div class="nav-tab" data-view="products">Products</div>
        <div class="nav-tab" data-view="sales">Sales</div>
        <div class="nav-tab" data-view="customers">Customers</div>
        <div class="nav-tab" data-view="expenses">Expenses</div>
      </div>
      <div class="nav-right">
        <div class="shop-badge"><span>●</span><span>Manual IMS</span></div>
        <a href="/reports" class="btn-logout" style="text-decoration: none"
          >📊 Reports</a
        >
        <a href="/intelligence" class="btn-logout" style="text-decoration: none"
          >🧠 Intelligence</a
        >
        <a href="/integrations" class="btn-logout" style="text-decoration: none"
          >⚙️ Integrations</a
        >
        <a href="/settings" class="btn-logout" style="text-decoration: none"
          >👤 Settings</a
        >
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <button class="btn-logout" id="logoutBtn">Log out</button>
      </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
      <div class="mobile-nav-tab active" data-view="overview">📊 Overview</div>
      <div class="mobile-nav-tab" data-view="products">📦 Products</div>
      <div class="mobile-nav-tab" data-view="sales">🧾 Sales</div>
      <div class="mobile-nav-tab" data-view="customers">👥 Customers</div>
      <div class="mobile-nav-tab" data-view="expenses">💸 Expenses</div>
    </div>

    <div class="container">
      <div id="content">
        <div class="loading">
          <div class="spinner"></div>
          <div>Loading your dashboard...</div>
        </div>
      </div>
    </div>

    <!-- PRODUCT MODAL -->
    <div class="modal-overlay" id="productModal">
      <div class="modal">
        <h3 id="productModalTitle">Add Product</h3>
        <input type="hidden" id="pId" />
        <div class="form-row">
          <div class="form-group">
            <label>Product Name *</label
            ><input class="form-input" id="pName" placeholder="e.g. Haircut" />
          </div>
          <div class="form-group">
            <label>SKU</label
            ><input class="form-input" id="pSku" placeholder="e.g. HC-001" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category</label
            ><input
              class="form-input"
              id="pCategory"
              placeholder="e.g. Services"
            />
          </div>
          <div class="form-group">
            <label>Unit</label
            ><input
              class="form-input"
              id="pUnit"
              placeholder="unit / hour / kg"
              value="unit"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Sale Price ($) *</label
            ><input
              class="form-input"
              id="pSalePrice"
              type="number"
              placeholder="0.00"
              step="0.01"
            />
          </div>
          <div class="form-group">
            <label>Cost Price ($)</label
            ><input
              class="form-input"
              id="pCostPrice"
              type="number"
              placeholder="0.00"
              step="0.01"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Initial Stock</label
            ><input
              class="form-input"
              id="pInitQty"
              type="number"
              placeholder="0"
            />
          </div>
          <div class="form-group">
            <label>Low Stock Alert At</label
            ><input
              class="form-input"
              id="pLowStock"
              type="number"
              placeholder="10"
            />
          </div>
        </div>
        <div class="form-group">
          <label
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              cursor: pointer;

    <!-- SALE MODAL -->
    <div class="modal-overlay" id="saleModal">

          "
        >
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 14px;
            "
          >
            <span style="color: #9ca7d6">Total</span>
            <span style="color: #d8b4fe; font-weight: 700" id="saleTotalDisplay"
              >$0.00</span
            >
          </div>

        <div class="modal-actions">

    <!-- CUSTOMER MODAL (Add/Edit) -->
    <div class="modal-overlay" id="customerModal">
      <div class="modal">
        <h3 id="customerModalTitle">Add Customer</h3>
        <input type="hidden" id="cId" />
        <div class="form-row">

          <label>Phone</label
          ><input
            class="form-input"
            id="cPhone"
            placeholder="+1 (555) 000-0000"

        <div class="form-group">
          <label>Notes</label
          ><input class="form-input" id="cNotes" placeholder="Any notes..." />

        <div class="modal-actions">

            Cancel
          </button>
          <button class="btn-save" onclick="saveCustomer()">
            Save Customer
          </button>

    <!-- CUSTOMER PROFILE MODAL -->
    <div class="modal-overlay" id="customerProfileModal">
      <div class="modal modal-xl">
        <div id="customerProfileContent">
          <div class="loading"><div class="spinner"></div></div>
        </div>
        <div class="modal-actions" style="margin-top: 16px">
          <button
            class="btn-cancel"
            onclick="closeModal('customerProfileModal')"
          >
            Close
          </button>
          <button class="btn-save" id="editCustomerBtn">
            ✏️ Edit Customer
          </button>

    <!-- EXPENSE MODAL -->
    <div class="modal-overlay" id="expenseModal">
      <div class="modal">
        <h3 id="expenseModalTitle">Log Expense</h3>
        <input type="hidden" id="eId" />
        <div class="form-group">
          <label>Category *</label>
          <select class="form-input" id="eCategory">
            <option value="rent">Rent</option>
            <option value="supplies">Supplies</option>
            <option value="payroll">Payroll</option>
            <option value="utilities">Utilities</option>
            <option value="marketing">Marketing</option>
            <option value="equipment">Equipment</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount ($) *</label
          ><input
            class="form-input"
            id="eAmount"
            type="number"
            placeholder="0.00"
            step="0.01"
          />
        </div>
        <div class="form-group">
          <label>Date</label><input class="form-input" id="eDate" type="date" />
        </div>
        <div class="form-group">
          <label>Description</label
          ><input
            class="form-input"
            id="eDesc"
            placeholder="Optional description..."
          />
        </div>
        <div class="modal-actions">
          <button
            class="btn-danger"
            id="eDeleteBtn"
            style="display: none"
            onclick="deleteExpense()"
          >
            Delete
          </button>
          <button class="btn-cancel" onclick="closeModal('expenseModal')">
            Cancel
          </button>
          <button class="btn-save" onclick="saveExpense()">Save Expense</button>
        </div>
      </div>
    </div>

    <script>
      const BACKEND_URL = "https://api.aervoapp.com";
      const token = localStorage.getItem("aervo_token");
      if (!token) window.location.href = "/login";

      let currentView = "overview";
      let merchantId = null;
      let imsData = {
        products: [],
        sales: [],
        customers: [],
        expenses: [],
        summary: null,
      };
      let charts = {};
      let salesPeriod = "daily";

      // ── NAV ──────────────────────────────────────────────────────
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("aervo_token");
        localStorage.removeItem("aervo_user");
        window.location.href = "/login";
      });
      document
        .getElementById("mobileMenuBtn")
        .addEventListener("click", () =>
          document.getElementById("mobileMenu").classList.toggle("active"),
        );

      document.querySelectorAll(".nav-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          currentView = tab.dataset.view;
          document
            .querySelectorAll(".nav-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          destroyCharts();
          renderView(currentView);
        });
      });
      document.querySelectorAll(".mobile-nav-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          currentView = tab.dataset.view;
          document
            .querySelectorAll(".mobile-nav-tab,.nav-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          document.getElementById("mobileMenu").classList.remove("active");
          destroyCharts();
          renderView(currentView);
        });
      });

      function destroyCharts() {
        Object.values(charts).forEach((c) => {
          try {
            c.destroy();
          } catch (e) {}
        });
        charts = {};
      }

      // ── INIT ─────────────────────────────────────────────────────
      async function init() {
        try {
          const res = await fetch(`${BACKEND_URL}/api/user/me`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) {
            window.location.href = "/login";
            return;
          }
          const data = await res.json();
          merchantId = String(data.user.id);
          await loadAllData();
          renderView("overview");
        } catch (err) {
          document.getElementById("content").innerHTML =
            `<div class="empty-state" style="color:#fca5a5">Failed to load dashboard. Please refresh.</div>`;
        }
      }

      async function loadAllData() {
        const h = { Authorization: `Bearer ${token}` };
        const b = `${BACKEND_URL}/api/ims`;
        const [pR, sR, cR, eR, smR] = await Promise.all([
          fetch(`${b}/products?merchant_id=${merchantId}`, { headers: h }),
          fetch(`${b}/sales?merchant_id=${merchantId}`, { headers: h }),
          fetch(`${b}/customers?merchant_id=${merchantId}`, { headers: h }),
          fetch(`${b}/expenses?merchant_id=${merchantId}`, { headers: h }),
          fetch(`${b}/analytics/summary?merchant_id=${merchantId}`, {
            headers: h,
          }),
        ]);
        imsData.products = pR.ok ? await pR.json() : [];
        imsData.sales = sR.ok ? await sR.json() : [];
        imsData.customers = cR.ok ? await cR.json() : [];
        imsData.expenses = eR.ok ? await eR.json() : [];
        imsData.summary = smR.ok ? await smR.json() : null;
      }

      function renderView(v) {
        const el = document.getElementById("content");
        if (v === "overview") renderOverview(el);
        else if (v === "products") renderProducts(el);
        else if (v === "sales") renderSales(el);
        else if (v === "customers") renderCustomers(el);
        else if (v === "expenses") renderExpenses(el);
      }

      function fmt(n) {
        n = parseFloat(n) || 0;
        if (n >= 1000000) return "$" + (n / 1000000).toFixed(1) + "M";
        if (n >= 1000) return "$" + (n / 1000).toFixed(1) + "K";
        return "$" + n.toFixed(2);
      }
      function fmtDate(d) {
        return new Date(d).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }
      function pct(a, b) {
        return b > 0 ? ((a / b) * 100).toFixed(1) + "%" : "—";
      }

      // ── OVERVIEW ─────────────────────────────────────────────────
      function renderOverview(el) {
        const s = imsData.summary || {};
        const revenue = parseFloat(s.total_revenue) || 0,
          cogs = parseFloat(s.total_cogs) || 0;
        const grossProfit = parseFloat(s.gross_profit) || 0,
          expenses = parseFloat(s.total_expenses) || 0;
        const netProfit = parseFloat(s.net_profit) || 0,
          orders = parseInt(s.total_orders) || 0;
        const lowStock = imsData.products.filter(
          (p) =>
            !p.is_service &&
            parseFloat(p.quantity) <= parseFloat(p.low_stock_threshold || 10),
        );
        const insights = generateInsights(s, lowStock);

        el.innerHTML = `
          <div class="welcome"><h1>Business Overview 📦</h1><p>Your manual IMS dashboard — all data in one place.</p></div>
          <div class="ai-banner">
            <div class="ai-banner-header"><div class="ai-icon">🤖</div><h2>AI Insights</h2></div>
            <div>${insights.length ? insights.map((i) => `<div class="insight-item"><span class="insight-priority priority-${i.priority}">${i.label}</span><strong>${i.title}</strong> — ${i.desc}</div>`).join("") : `<div class="insight-item">Add products and log sales to unlock AI insights.</div>`}</div>
          </div>
          <div class="grid-4">
            <div class="card"><h3>Total Revenue</h3><div class="stat-large green">${fmt(revenue)}</div><div class="stat-label">${orders} sales logged</div></div>
            <div class="card"><h3>Gross Profit</h3><div class="stat-large ${grossProfit >= 0 ? "green" : "red"}">${fmt(grossProfit)}</div><div class="stat-label">Margin: ${pct(grossProfit, revenue)}</div></div>
            <div class="card"><h3>Net Profit</h3><div class="stat-large ${netProfit >= 0 ? "green" : "red"}">${fmt(netProfit)}</div><div class="stat-label">After all expenses</div></div>
            <div class="card"><h3>Total Expenses</h3><div class="stat-large yellow">${fmt(expenses)}</div><div class="stat-label">${imsData.expenses.length} entries</div></div>
          </div>
          <div class="grid-3">
            <div class="card"><h3>Products</h3><div class="stat-large blue">${imsData.products.length}</div><div class="stat-label">${lowStock.length > 0 ? `⚠️ ${lowStock.length} low stock` : "All levels OK"}</div></div>
            <div class="card"><h3>Customers</h3><div class="stat-large">${imsData.customers.length}</div><div class="stat-label">Registered customers</div></div>
            <div class="card"><h3>Avg Sale Value</h3><div class="stat-large blue">${orders > 0 ? fmt(revenue / orders) : "$0.00"}</div><div class="stat-label">Per transaction</div></div>
          </div>
          <div class="grid-2">
            <div class="card"><h3>Recent Sales</h3>
              <div class="table-wrapper"><table class="data-table"><thead><tr><th>Date</th><th>Customer</th><th>Total</th></tr></thead><tbody>
                ${
                  imsData.sales
                    .slice(0, 5)
                    .map(
                      (s) =>
                        `<tr><td style="color:#64748b">${fmtDate(s.sale_date)}</td><td>${s.first_name ? s.first_name + " " + s.last_name : "Walk-in"}</td><td style="color:#34d399;font-weight:600">${fmt(s.total_amount)}</td></tr>`,
                    )
                    .join("") ||
                  `<tr><td colspan="3" class="empty-state">No sales yet</td></tr>`
                }
              </tbody></table></div>
            </div>
            <div class="card"><h3>🤖 Ask Aervo AI</h3>
              <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                  <div class="chat-message ai">👋 Hi! I'm <strong>Aervo</strong>.<br><br>
                    • <span style="color:#d8b4fe;cursor:pointer" onclick="askSuggestion(this)">What are my best-selling products?</span><br>
                    • <span style="color:#d8b4fe;cursor:pointer" onclick="askSuggestion(this)">How can I improve my profit margin?</span><br>
                    • <span style="color:#d8b4fe;cursor:pointer" onclick="askSuggestion(this)">Which items should I reorder soon?</span>
                  </div>
                </div>
                <div class="chat-input-wrapper">
                  <input type="text" class="chat-input" id="chatInput" placeholder="Ask anything about your business..." />
                  <button class="btn-send" onclick="sendMessage()">Send</button>
                </div>
              </div>
            </div>
          </div>`;
        document
          .getElementById("chatInput")
          ?.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
          });
      }

      function generateInsights(s, lowStock) {
        const insights = [];
        const net = parseFloat(s.net_profit) || 0,
          revenue = parseFloat(s.total_revenue) || 0,
          expenses = parseFloat(s.total_expenses) || 0;
        if (lowStock.length)
          insights.push({
            priority: "high",
            label: "ALERT",
            title: "Low Stock Warning",
            desc: `${lowStock.map((p) => p.name).join(", ")} need restocking soon.`,
          });
        if (revenue > 0 && expenses / revenue > 0.7)
          insights.push({
            priority: "high",
            label: "ALERT",
            title: "High Expense Ratio",
            desc: `Expenses are ${Math.round((expenses / revenue) * 100)}% of revenue. Look for ways to reduce costs.`,
          });
        if (net > 0)
          insights.push({
            priority: "low",
            label: "INSIGHT",
            title: "Business is Profitable",
            desc: `Net profit of ${fmt(net)} — keep monitoring expenses to maintain healthy margins.`,
          });
        if (net < 0)
          insights.push({
            priority: "high",
            label: "ALERT",
            title: "Operating at a Loss",
            desc: `Net loss of ${fmt(Math.abs(net))}. Review expenses and consider pricing adjustments.`,
          });
        if ((s.top_products || []).length)
          insights.push({
            priority: "low",
            label: "INSIGHT",
            title: `Top Performer: ${s.top_products[0].name}`,
            desc: `Generated ${fmt(s.top_products[0].revenue)} in revenue. Consider promoting it further.`,
          });
        return insights.slice(0, 3);
      }

      // ── PRODUCTS TAB ─────────────────────────────────────────────
      function renderProducts(el) {
        const products = imsData.products;
        const topRevProd = [...products].sort((a, b) => {
          const ra = imsData.sales.reduce((s, sale) => {
            const items = Array.isArray(sale.items) ? sale.items : [];
            return (
              s +
              items
                .filter((i) => i.product_id === a.id)
                .reduce((x, i) => x + (parseFloat(i.line_total) || 0), 0)
            );
          }, 0);
          const rb = imsData.sales.reduce((s, sale) => {
            const items = Array.isArray(sale.items) ? sale.items : [];
            return (
              s +
              items
                .filter((i) => i.product_id === b.id)
                .reduce((x, i) => x + (parseFloat(i.line_total) || 0), 0)
            );
          }, 0);
          return rb - ra;
        });

        // compute per-product stats
        const prodStats = {};
        imsData.sales.forEach((sale) => {
          (Array.isArray(sale.items) ? sale.items : []).forEach((item) => {
            if (!item.product_id) return;
            if (!prodStats[item.product_id])
              prodStats[item.product_id] = { revenue: 0, units: 0 };
            prodStats[item.product_id].revenue +=
              parseFloat(item.line_total) || 0;
            prodStats[item.product_id].units += parseFloat(item.quantity) || 0;
          });
        });

        el.innerHTML = `
          <div class="page-header">
            <div><h1>Products & Inventory 📦</h1><p>Manage your catalog, stock levels, and performance.</p></div>
            <button class="btn-add" onclick="openAddProduct()">+ Add Product</button>
          </div>

          <div class="grid-2">
            <div class="card"><h3>Revenue by Product</h3><div class="chart-wrap"><canvas id="chartRevProd"></canvas></div></div>
            <div class="card"><h3>Stock Levels</h3><div class="chart-wrap"><canvas id="chartStock"></canvas></div></div>
          </div>

          <div class="card" style="margin-bottom:24px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
              <h3 style="margin:0">All Products <span style="color:#64748b;font-weight:400;font-size:12px">(click to edit)</span></h3>
            </div>
            <div class="table-wrapper">
              <table class="data-table">
                <thead><tr><th>Product</th><th>Category</th><th>Sale Price</th><th>Cost</th><th>Margin</th><th>Units Sold</th><th>Revenue</th><th>Stock</th></tr></thead>
                <tbody>
                  ${
                    products.length
                      ? products
                          .map((p) => {
                            const margin =
                              p.sale_price > 0
                                ? (
                                    ((p.sale_price - p.cost_price) /
                                      p.sale_price) *
                                    100
                                  ).toFixed(0) + "%"
                                : "—";
                            const qty = parseFloat(p.quantity) || 0,
                              threshold =
                                parseFloat(p.low_stock_threshold) || 10;
                            const stockBadge = p.is_service
                              ? `<span class="badge badge-blue">Service</span>`
                              : qty <= 0
                                ? `<span class="badge badge-red">Out of stock</span>`
                                : qty <= threshold
                                  ? `<span class="badge badge-yellow">${qty} — Low</span>`
                                  : `<span class="badge badge-green">${qty}</span>`;
                            const ps = prodStats[p.id] || {
                              revenue: 0,
                              units: 0,
                            };
                            return `<tr class="clickable" onclick="openEditProduct(${p.id})">
                      <td style="color:#e5ecff;font-weight:500">${p.name}${p.sku ? `<div style="font-size:11px;color:#64748b">${p.sku}</div>` : ""}
                        <div style="font-size:11px;color:#a855f7;margin-top:2px">✏️ click to edit</div>
                      </td>
                      <td style="color:#9ca7d6">${p.category || "—"}</td>
                      <td style="color:#34d399;font-weight:600">${fmt(p.sale_price)}</td>
                      <td style="color:#9ca7d6">${fmt(p.cost_price)}</td>
                      <td><span class="badge ${parseFloat(margin) >= 50 ? "badge-green" : parseFloat(margin) >= 30 ? "badge-yellow" : "badge-red"}">${margin}</span></td>
                      <td style="color:#9ca7d6">${ps.units.toFixed(0)}</td>
                      <td style="color:#d8b4fe;font-weight:600">${fmt(ps.revenue)}</td>
                      <td>${stockBadge}</td>
                    </tr>`;
                          })
                          .join("")
                      : `<tr><td colspan="8" class="empty-state">No products yet. Add your first product above.</td></tr>`
                  }
                </tbody>
              </table>
            </div>
          </div>`;

        // Charts
        requestAnimationFrame(() => {
          const labels = products.slice(0, 8).map((p) => p.name);
          const revData = products
            .slice(0, 8)
            .map((p) => (prodStats[p.id] || { revenue: 0 }).revenue.toFixed(2));
          const stockData = products
            .filter((p) => !p.is_service)
            .slice(0, 8)
            .map((p) => parseFloat(p.quantity) || 0);
          const stockLabels = products
            .filter((p) => !p.is_service)
            .slice(0, 8)
            .map((p) => p.name);

          charts.revProd = new Chart(document.getElementById("chartRevProd"), {
            type: "bar",
            data: {
              labels,
              datasets: [
                {
                  label: "Revenue ($)",
                  data: revData,
                  backgroundColor: "rgba(168,85,247,0.6)",
                  borderColor: "#a855f7",
                  borderWidth: 1,
                  borderRadius: 6,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  ticks: { color: "#6b7a99", font: { size: 10 } },
                  grid: { color: "rgba(255,255,255,0.04)" },
                },
                y: {
                  ticks: {
                    color: "#6b7a99",
                    font: { size: 10 },
                    callback: (v) => "$" + v,
                  },
                  grid: { color: "rgba(255,255,255,0.04)" },
                },
              },
            },
          });
          charts.stock = new Chart(document.getElementById("chartStock"), {
            type: "bar",
            data: {
              labels: stockLabels,
              datasets: [
                {
                  label: "Stock",
                  data: stockData,
                  backgroundColor: stockData.map((v, i) => {
                    const p = products.filter((x) => !x.is_service)[i];
                    return v <= 0
                      ? "rgba(239,68,68,0.6)"
                      : v <= (parseFloat(p?.low_stock_threshold) || 10)
                        ? "rgba(251,191,36,0.6)"
                        : "rgba(52,211,153,0.6)";
                  }),
                  borderRadius: 6,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  ticks: { color: "#6b7a99", font: { size: 10 } },
                  grid: { color: "rgba(255,255,255,0.04)" },
                },
                y: {
                  ticks: { color: "#6b7a99", font: { size: 10 } },
                  grid: { color: "rgba(255,255,255,0.04)" },
                },
              },
            },
          });
        });
      }

      // ── SALES TAB ─────────────────────────────────────────────
      function renderSales(el) {
        el.innerHTML = `
          <div class="page-header">
            <div><h1>Sales 🧾</h1><p>All transactions, analytics, and trends.</p></div>
            <button class="btn-add" onclick="openLogSale()">+ Log Sale</button>
          </div>
          <div class="period-tabs">
            <div class="period-tab ${salesPeriod === "daily" ? "active" : ""}" onclick="setSalesPeriod('daily')">Daily</div>
            <div class="period-tab ${salesPeriod === "weekly" ? "active" : ""}" onclick="setSalesPeriod('weekly')">Weekly</div>

      function buildSalesCharts() {
        requestAnimationFrame(() => {
          // Revenue over time
          const grouped = {};
          imsData.sales.forEach((s) => {
            const d = new Date(s.sale_date);
            let key;
            if (salesPeriod === "daily")
              key = d.toLocaleDateString("en-US", {
                month: "short",
                day: "numeric",
              });
            else if (salesPeriod === "weekly") {
              const w = getWeek(d);
              key = `W${w}`;
            } else
              key = d.toLocaleDateString("en-US", {
                month: "short",
                year: "2-digit",
              });
            grouped[key] = (grouped[key] || 0) + parseFloat(s.total_amount);
          });
          const timeLabels = Object.keys(grouped).slice(-12);
          const timeData = timeLabels.map((k) => grouped[k].toFixed(2));

          charts.revTime = new Chart(document.getElementById("chartRevTime"), {
            type: "line",
            data: {
              labels: timeLabels,
              datasets: [
                {
                  label: "Revenue",
                  data: timeData,
                  borderColor: "#a855f7",
                  backgroundColor: "rgba(168,85,247,0.1)",
                  tension: 0.4,
                  fill: true,
                  pointBackgroundColor: "#a855f7",
                  pointRadius: 4,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  ticks: { color: "#6b7a99", font: { size: 10 } },
                  grid: { color: "rgba(255,255,255,0.04)" },
                },
                y: {
                  ticks: {
                    color: "#6b7a99",
                    font: { size: 10 },
                    callback: (v) => "$" + v,
                  },
                  grid: { color: "rgba(255,255,255,0.04)" },
                },
              },
            },
          });

          // Payment methods
          const paymentMap = {};
          imsData.sales.forEach((s) => {
            paymentMap[s.payment_method] =
              (paymentMap[s.payment_method] || 0) + 1;
          });
          charts.payment = new Chart(document.getElementById("chartPayment"), {
            type: "doughnut",
            data: {
              labels: Object.keys(paymentMap),
              datasets: [
                {
                  data: Object.values(paymentMap),
                  backgroundColor: [
                    "rgba(168,85,247,0.7)",
                    "rgba(52,211,153,0.7)",
                    "rgba(96,165,250,0.7)",
                  ],
                  borderWidth: 0,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: "bottom",
                  labels: { color: "#9ca7d6", font: { size: 11 } },
                },
              },
            },
          });

          // Best sellers
          const prodStats = {};
          imsData.sales.forEach((sale) => {
            (Array.isArray(sale.items) ? sale.items : []).forEach((item) => {
              if (!item.product_name) return;
              if (!prodStats[item.product_name])
                prodStats[item.product_name] = { units: 0, revenue: 0 };
              prodStats[item.product_name].units +=
                parseFloat(item.quantity) || 0;
              prodStats[item.product_name].revenue +=
                parseFloat(item.line_total) || 0;
            });
          });
          const sorted = Object.entries(prodStats).sort(
            (a, b) => b[1].revenue - a[1].revenue,
          );
          document.getElementById("bestSellerBody").innerHTML = sorted.length
            ? sorted
                .slice(0, 6)
                .map(
                  ([name, s]) =>
                    `<tr><td style="color:#e5ecff;font-weight:500">${name}</td><td>${s.units.toFixed(0)}</td><td style="color:#34d399;font-weight:600">${fmt(s.revenue)}</td></tr>`,
                )
                .join("")
            : `<tr><td colspan="3" class="empty-state">No sales data yet</td></tr>`;
        });
      }

      function getWeek(d) {
        const s = new Date(d.getFullYear(), 0, 1);
        return Math.ceil(((d - s) / 86400000 + s.getDay() + 1) / 7);
      }

      function generateCustomerInsights(c, sales, favProducts, avgSpend) {
        const insights = [];
        const fullName =
          [c.first_name, c.last_name].filter(Boolean).join(" ") ||
          "This customer";
        if (sales.length === 0) {
          insights.push({
            label: "New Customer",
            text: `${fullName} hasn't made a purchase yet. Consider reaching out with a welcome offer to drive their first visit.`,
          });
          return insights;
        }
        if (sales.length >= 3)
          insights.push({
            label: "Loyal Customer",
            text: `${fullName} has visited ${sales.length} times — that's a strong retention signal. Consider offering a loyalty reward to keep them coming back.`,
          });
        else if (sales.length === 1)
          insights.push({
            label: "First-Time Buyer",
            text: `${fullName} has only visited once. A follow-up message or special offer could convert them into a returning customer.`,
          });
        if (favProducts.length)
          insights.push({
            label: "Product Preference",
            text: `${fullName} frequently purchases ${favProducts[0][0]}. Make sure it stays in stock and consider upselling complementary products.`,
          });
        const lastSale = sales[0];
        const daysSince = Math.floor(
          (Date.now() - new Date(lastSale.sale_date)) / 86400000,
        );
        if (daysSince > 30)
          insights.push({
            label: "Re-engagement Opportunity",
            text: `${fullName} hasn't visited in ${daysSince} days. A targeted promotion or reminder could bring them back.`,
          });
        else
          insights.push({
            label: "Recent Visit",
            text: `${fullName} visited ${daysSince === 0 ? "today" : daysSince === 1 ? "yesterday" : `${daysSince} days ago`} and spent ${fmt(parseFloat(lastSale.total_amount))}. They're an active customer.`,
          });
        return insights;
      }

      async function saveProduct() {
        const id = document.getElementById("pId").value;
        const name = document.getElementById("pName").value.trim();
        const sale_price = document.getElementById("pSalePrice").value;
        if (!name || !sale_price) {
          alert("Product name and sale price are required.");
          return;
        }
        const body = {
          merchant_id: merchantId,
          name,
          sku: document.getElementById("pSku").value,
          category: document.getElementById("pCategory").value,
          unit: document.getElementById("pUnit").value || "unit",
          sale_price: parseFloat(sale_price),
          cost_price:
            parseFloat(document.getElementById("pCostPrice").value) || 0,
          is_service: document.getElementById("pIsService").checked,
        };
        try {
          let res;
          if (id) {
            res = await fetch(`${BACKEND_URL}/api/ims/products/${id}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify(body),
            });
          } else {
            body.initial_quantity =
              parseFloat(document.getElementById("pInitQty").value) || 0;
            body.low_stock_threshold =
              parseFloat(document.getElementById("pLowStock").value) || 10;
            res = await fetch(`${BACKEND_URL}/api/ims/products`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify(body),
            });
          }
          if (!res.ok) throw new Error();
          closeModal("productModal");
          await loadAllData();
          destroyCharts();
          renderView("products");
        } catch {
          alert("Error saving product. Please try again.");
        }
      }

          .toISOString()
          .slice(0, 16);
        document.getElementById("saleItems").innerHTML = "";
        document.getElementById("saleTotalDisplay").textContent = "$0.00";
        addSaleItemRow();
        openModal("saleModal");
      }

      function addSaleItemRow() {
        const idx = saleItemRows.length;
        saleItemRows.push({});
        const div = document.createElement("div");
        div.style.cssText =
          "display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:8px;align-items:center";
        div.innerHTML = `
          <select class="form-input" id="sItem_${idx}_prod" onchange="updateSaleRow(${idx})">
            <option value="">Select product...</option>
            ${imsData.products.map((p) => `<option value="${p.id}" data-price="${p.sale_price}" data-cost="${p.cost_price}">${p.name} — ${fmt(p.sale_price)}</option>`).join("")}
          </select>
          <input class="form-input" id="sItem_${idx}_qty" type="number" placeholder="Qty" value="1" min="0.01" step="any" onchange="updateSaleRow(${idx})" />
          <span id="sItem_${idx}_total" style="color:#d8b4fe;font-size:13px;text-align:right">$0.00</span>`;
        document.getElementById("saleItems").appendChild(div);
      }

      function updateSaleRow(idx) {
        const sel = document.getElementById(`sItem_${idx}_prod`);
        const qty =
          parseFloat(document.getElementById(`sItem_${idx}_qty`).value) || 0;
        const opt = sel.options[sel.selectedIndex];
        const price = parseFloat(opt?.dataset?.price) || 0,
          cost = parseFloat(opt?.dataset?.cost) || 0;
        document.getElementById(`sItem_${idx}_total`).textContent = fmt(
          price * qty,
        );
        saleItemRows[idx] = {
          product_id: sel.value,
          quantity: qty,
          unit_price: price,
          unit_cost: cost,
        };
        document.getElementById("saleTotalDisplay").textContent = fmt(
          saleItemRows.reduce(
            (s, r) => s + (r.unit_price || 0) * (r.quantity || 0),
            0,
          ),
        );
      }

      async function saveSale() {
        const items = saleItemRows.filter(
          (r) => r.product_id && r.quantity > 0,
        );
        if (!items.length) {
          alert("Add at least one item.");
          return;
        }
        try {
          const res = await fetch(`${BACKEND_URL}/api/ims/sales`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              merchant_id: merchantId,
              customer_id: document.getElementById("sCustomer").value || null,
              payment_method: document.getElementById("sPayment").value,
              sale_date: document.getElementById("sSaleDate").value,
              items,
            }),
          });
          if (!res.ok) throw new Error();
          closeModal("saleModal");
          await loadAllData();
          destroyCharts();
          renderView("sales");
        } catch {
          alert("Error logging sale. Please try again.");
        }
      }

      // Customer
      function openAddCustomer() {
        document.getElementById("customerModalTitle").textContent =
          "Add Customer";
        document.getElementById("cId").value = "";
        ["cFirst", "cLast", "cEmail", "cPhone", "cNotes"].forEach(
          (id) => (document.getElementById(id).value = ""),
        );
        openModal("customerModal");
      }

      function openEditCustomer(customerId) {
        const c = imsData.customers.find((x) => x.id === customerId);
        if (!c) return;
        document.getElementById("customerModalTitle").textContent =
          "Edit Customer";
        document.getElementById("cId").value = c.id;
        document.getElementById("cFirst").value = c.first_name || "";
        document.getElementById("cLast").value = c.last_name || "";
        document.getElementById("cEmail").value = c.email || "";
        document.getElementById("cPhone").value = c.phone || "";
        document.getElementById("cNotes").value = c.notes || "";
        openModal("customerModal");
      }

      async function saveCustomer() {
        const id = document.getElementById("cId").value;
        const body = {
          merchant_id: merchantId,
          first_name: document.getElementById("cFirst").value,
          last_name: document.getElementById("cLast").value,
          email: document.getElementById("cEmail").value,
          phone: document.getElementById("cPhone").value,
          notes: document.getElementById("cNotes").value,
        };
        try {
          const res = await fetch(
            id
              ? `${BACKEND_URL}/api/ims/customers/${id}`
              : `${BACKEND_URL}/api/ims/customers`,
            {
              method: id ? "PUT" : "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify(body),
            },
          );
          if (!res.ok) throw new Error();
          closeModal("customerModal");
          await loadAllData();
          destroyCharts();
          renderView("customers");
        } catch {
          alert("Error saving customer. Please try again.");
        }
      }

      // Expense
      function openAddExpense() {
        document.getElementById("expenseModalTitle").textContent =
          "Log Expense";
        document.getElementById("eId").value = "";
        document.getElementById("eAmount").value = "";
        document.getElementById("eDesc").value = "";
        document.getElementById("eDate").value = new Date()
          .toISOString()
          .split("T")[0];
        document.getElementById("eDeleteBtn").style.display = "none";
        openModal("expenseModal");
      }

      function openEditExpense(expenseId) {
        const e = imsData.expenses.find((x) => x.id === expenseId);
        if (!e) return;
        document.getElementById("expenseModalTitle").textContent =
          "Edit Expense";
        document.getElementById("eId").value = e.id;
        document.getElementById("eCategory").value = e.category;
        document.getElementById("eAmount").value = e.amount;
        document.getElementById("eDesc").value = e.description || "";
        document.getElementById("eDate").value =
          e.expense_date?.split("T")[0] ||
          new Date().toISOString().split("T")[0];
        document.getElementById("eDeleteBtn").style.display = "inline-flex";
        openModal("expenseModal");
      }

      async function saveExpense() {
        const id = document.getElementById("eId").value;
        const amount = document.getElementById("eAmount").value;
        if (!amount) {
          alert("Amount is required.");
          return;
        }
        const body = {
          merchant_id: merchantId,
          category: document.getElementById("eCategory").value,
          amount: parseFloat(amount),
          expense_date: document.getElementById("eDate").value,
          description: document.getElementById("eDesc").value,
        };
        try {
          const res = await fetch(
            id
              ? `${BACKEND_URL}/api/ims/expenses/${id}`
              : `${BACKEND_URL}/api/ims/expenses`,
            {
              method: id ? "PUT" : "DELETE" === "PUT" ? "PUT" : "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify(body),
            },
          );
          if (!res.ok) throw new Error();
          closeModal("expenseModal");
          await loadAllData();
          destroyCharts();
          renderView("expenses");
        } catch {
          alert("Error saving expense. Please try again.");
        }
      }

      async function deleteExpense() {
        const id = document.getElementById("eId").value;
        if (!id || !confirm("Delete this expense?")) return;
        try {
          await fetch(`${BACKEND_URL}/api/ims/expenses/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          closeModal("expenseModal");
          await loadAllData();
          destroyCharts();
          renderView("expenses");
        } catch {
          alert("Error deleting expense.");
        }
      }

      // ── CHAT ─────────────────────────────────────────────────────
      let isAIThinking = false;
      async function sendMessage() {
        if (isAIThinking) return;
        const input = document.getElementById("chatInput");
        const messages = document.getElementById("chatMessages");
        const message = input?.value?.trim();
        if (!message || !messages) return;
        const userMsg = document.createElement("div");
        userMsg.className = "chat-message user";
        userMsg.textContent = message;
        messages.appendChild(userMsg);
        input.value = "";
        messages.scrollTop = messages.scrollHeight;
        isAIThinking = true;
        const typingEl = document.createElement("div");
        typingEl.className = "chat-message ai";
        typingEl.id = "typingIndicator";
        typingEl.innerHTML =
          "<em style='color:#64748b'>Aervo is thinking...</em>";
        messages.appendChild(typingEl);
        input.disabled = true;
        try {
          const res = await fetch(`${BACKEND_URL}/api/ai/chat`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ message, merchantId, platform: "ims" }),
          });
          const data = await res.json();
          document.getElementById("typingIndicator")?.remove();
          const aiMsg = document.createElement("div");
          aiMsg.className = "chat-message ai";
          aiMsg.innerHTML = (data.reply || "Sorry, I couldn't respond.")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/\n/g, "<br>");
          messages.appendChild(aiMsg);
        } catch {
          document.getElementById("typingIndicator")?.remove();
          const errMsg = document.createElement("div");
          errMsg.className = "chat-message ai";
          errMsg.textContent =
            "Sorry, I had trouble responding. Please try again.";
          messages.appendChild(errMsg);
        }
        isAIThinking = false;
        input.disabled = false;
        input.focus();
        messages.scrollTop = messages.scrollHeight;
      }
      function askSuggestion(el) {
        const input = document.getElementById("chatInput");
        if (input) {
          input.value = el.textContent;
          sendMessage();
        }
      }

      // ── EXPENSE EDIT PATCH ───────────────────────────────────────
      // Add PUT for expenses (backend already has DELETE, need PUT)
      const _origSaveExpense = saveExpense;

      init();
    </script>
  </body>
</html>
