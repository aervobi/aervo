<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aervo – Square Dashboard</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e5e7eb;
        min-height: 100vh;
      }
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: rgba(5, 8, 23, 0.96);
        backdrop-filter: blur(14px);
        z-index: 100;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 0;
        min-width: 140px;
        flex-shrink: 0;
      }
      .nav-center {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      /* Integration switcher tabs */
      .integration-switcher {
        display: flex;
        gap: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 4px;
        margin-right: 16px;
      }
      .switcher-tab {
        padding: 6px 14px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #64748b;
        transition: all 0.2s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .switcher-tab.active {
        background: rgba(52, 211, 153, 0.2);
        color: #34d399;
      }
      .switcher-tab.shopify-tab.active {
        background: rgba(96, 165, 250, 0.2);
        color: #60a5fa;
      }
      .switcher-tab:hover:not(.active) {
        color: #9ca7d6;
        background: rgba(255, 255, 255, 0.05);
      }

      .nav-tab {
        padding: 8px 16px;
        border-radius: 8px;
        color: #9ca7d6;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
        border: 1px solid transparent;
      }
      .nav-tab:hover {
        background: rgba(52, 211, 153, 0.08);
        color: #e5ecff;
      }
      .nav-tab.active {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.3);
        color: #e5ecff;
      }
      .nav-right {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .shop-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(52, 211, 153, 0.15);
        color: #6ee7b7;
        font-size: 11px;
        border: 1px solid rgba(52, 211, 153, 0.3);
      }
      .btn-logout {
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid #3a4a7c;
        background: transparent;
        color: #dfe7ff;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-logout:hover {
        background: #1a2237;
      }
      .container {
        padding: 88px 32px 48px;
        max-width: 1600px;
        margin: 0 auto;
      }
      .welcome {
        margin-bottom: 32px;
      }
      .welcome h1 {
        font-size: 32px;
        margin: 0 0 8px;
        color: #f9fafb;
      }
      .welcome p {
        margin: 0;
        font-size: 15px;
        color: #9ca7d6;
      }
      .ai-banner {
        background: linear-gradient(135deg, #064e3b 0%, #059669 100%);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 32px;
        border: 1px solid rgba(5, 150, 105, 0.3);
        box-shadow: 0 10px 40px rgba(5, 150, 105, 0.2);
      }
      .ai-banner-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .ai-icon {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .ai-banner h2 {
        font-size: 18px;
        color: white;
        margin: 0;
      }
      .insight-item {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 14px;
        line-height: 1.6;
      }
      .insight-item:last-child {
        margin-bottom: 0;
      }
      .insight-priority {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        margin-right: 8px;
      }
      .priority-high {
        background: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
      }
      .priority-medium {
        background: rgba(251, 191, 36, 0.2);
        color: #fde047;
      }
      .priority-low {
        background: rgba(34, 197, 94, 0.2);
        color: #86efac;
      }
      .grid-4 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }
      .card {
        background: radial-gradient(circle at top left, #1e293b, #0f172a);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      .card h3 {
        font-size: 14px;
        color: #9ca7d6;
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .stat-large {
        font-size: 42px;
        font-weight: 700;
        color: #34d399;
        margin: 8px 0;
        line-height: 1;
      }
      .stat-large.blue {
        color: #60a5fa;
      }
      .stat-large.yellow {
        color: #fbbf24;
      }
      .stat-large.red {
        color: #ef4444;
      }
      .stat-change {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        padding: 4px 8px;
        border-radius: 6px;
        margin-top: 8px;
      }
      .stat-change.positive {
        background: rgba(34, 197, 94, 0.15);
        color: #6ee7b7;
      }
      .stat-change.negative {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
      }
      .stat-label {
        font-size: 13px;
        color: #64748b;
        margin-top: 4px;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
      }
      .data-table th {
        text-align: left;
        padding: 12px;
        font-size: 12px;
        color: #9ca7d6;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        font-weight: 600;
      }
      .data-table td {
        padding: 12px;
        font-size: 13px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      }
      .data-table tr:hover {
        background: rgba(52, 211, 153, 0.05);
      }
      .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 12px;
        margin: -24px;
        margin-top: 16px;
      }
      .loading {
        text-align: center;
        padding: 60px 20px;
        color: #9ca7d6;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(148, 163, 184, 0.2);
        border-top-color: #34d399;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge-green {
        background: rgba(52, 211, 153, 0.15);
        color: #6ee7b7;
        border: 1px solid rgba(52, 211, 153, 0.3);
      }
      .badge-yellow {
        background: rgba(251, 191, 36, 0.15);
        color: #fde047;
        border: 1px solid rgba(251, 191, 36, 0.3);
      }
      .badge-red {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .badge-blue {
        background: rgba(96, 165, 250, 0.15);
        color: #93c5fd;
        border: 1px solid rgba(96, 165, 250, 0.3);
      }
      .review-card {
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        min-height: 48px;
      }
      .review-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
      }
      .review-name {
        font-size: 14px;
        font-weight: 600;
        color: #e5ecff;
      }
      .review-date {
        font-size: 11px;
        color: #64748b;
      }
      .review-text {
        font-size: 13px;
        color: #9ca7d6;
        line-height: 1.6;
        margin-bottom: 10px;
      }
      .review-ai {
        background: rgba(52, 211, 153, 0.08);
        border: 1px solid rgba(52, 211, 153, 0.2);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 12px;
        color: #6ee7b7;
      }
      .review-ai strong {
        color: #34d399;
      }
      .chat-container {
        padding: 0;
        height: 360px;
        display: flex;
        flex-direction: column;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 16px;
        padding-right: 4px;
      }
      .chat-message {
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 10px;
        font-size: 14px;
        line-height: 1.5;
      }
      .chat-message.user {
        background: rgba(52, 211, 153, 0.2);
        border: 1px solid rgba(52, 211, 153, 0.3);
      }
      .chat-message.ai {
        background: rgba(148, 163, 184, 0.1);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      .chat-input-wrapper {
        display: flex;
        gap: 10px;
      }
      .chat-input {
        flex: 1;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(15, 23, 42, 0.6);
        color: #e5ecff;
        font-size: 16px;
        min-height: 44px;
      }
      .chat-input:focus {
        outline: none;
        border-color: #34d399;
      }
      .btn-send {
        padding: 12px 20px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #059669, #34d399);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        min-height: 44px;
        min-width: 44px;
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 28px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #059669, #34d399);
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 10px 30px rgba(5, 150, 105, 0.4);
        transition: all 0.2s ease;
        min-height: 44px;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
      }
      .location-selector {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .location-btn {
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: transparent;
        color: #9ca7d6;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        min-height: 44px;
        display: flex;
        align-items: center;
      }
      .location-btn.active {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.4);
        color: #34d399;
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #64748b;
        font-size: 14px;
      }
      .mobile-menu-btn {
        display: none;
        background: none;
        border: none;
        color: #e5ecff;
        font-size: 24px;
        cursor: pointer;
        padding: 8px;
      }
      .mobile-menu {
        display: none;
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        background: rgba(5, 8, 23, 0.98);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        z-index: 99;
        padding: 16px;
      }
      .mobile-menu.active {
        display: block;
      }
      .mobile-nav-tab {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 14px 16px;
        margin-bottom: 8px;
        border-radius: 8px;
        color: #9ca7d6;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s ease;
        border: 1px solid transparent;
        text-align: left;
        min-height: 44px;
      }
      .mobile-nav-tab.active {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.3);
        color: #34d399;
      }
      @media (max-width: 768px) {
        .nav {
          padding: 0 16px;
          height: 56px;
        }
        .nav-center {
          display: none;
        }
        .mobile-menu-btn {
          display: block;
          min-height: 44px;
          min-width: 44px;
        }
        .integration-switcher {
          display: none;
        }
        .container {
          padding: 72px 12px 24px;
        }
        .welcome h1 {
          font-size: 22px;
        }
        .grid-4,
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
          gap: 16px;
        }
        .card {
          padding: 16px;
        }
        .stat-large {
          font-size: 32px;
        }
        .btn-logout {
          padding: 8px 12px;
          font-size: 12px;
          min-height: 44px;
        }
        .btn-primary {
          min-height: 44px;
          padding: 12px 24px;
        }
        .chat-input {
          font-size: 16px;
          min-height: 44px;
        }
        .btn-send {
          min-height: 44px;
          min-width: 44px;
          padding: 12px 16px;
        }
      }

      @media (max-width: 480px) {
        .nav {
          height: 52px;
          padding: 0 8px;
        }
        .nav-brand {
          font-size: 11px;
          gap: 0;
          flex-shrink: 0;
        }
        .container {
          padding: 60px 8px 20px;
        }
        .welcome h1 {
          font-size: 20px;
        }
        .stat-large {
          font-size: 28px;
        }
        .grid-4 {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .card h3 {
          font-size: 11px;
        }
        .stat-change {
          font-size: 11px;
          padding: 3px 6px;
        }
        .chat-messages {
          max-height: 200px;
        }
        canvas {
          max-height: 200px !important;
          max-width: 100%;
        }
      }

      .filter-btn {
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: transparent;
        color: #9ca7d6;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-btn:hover {
        background: rgba(148, 163, 184, 0.1);
        color: #e5ecff;
      }
      .active-filter {
        background: rgba(96, 165, 250, 0.15);
        border-color: rgba(96, 165, 250, 0.4);
        color: #60a5fa;
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a
        href="/dashboard/square"
        class="nav-brand"
        style="
          display: flex;
          align-items: center;
          gap: 0;
          text-decoration: none;
        "
      >
        <img
          src="/assets/images/logo.png"
          alt="Aervo"
          style="height: 38px; width: auto"
        />
        <div
          id="companyLogoContainer"
          style="
            display: none;
            align-items: center;
            gap: 10px;
            margin-left: 14px;
            padding-left: 14px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
          "
        >
          <img
            id="companyLogo"
            src=""
            alt=""
            style="
              height: 32px;
              width: auto;
              border-radius: 6px;
              object-fit: contain;
            "
          />
          <span
            id="companyLogoName"
            style="font-size: 14px; color: #e5e7eb; font-weight: 600"
          ></span>
        </div>
      </a>
      <div class="nav-center">
        <!-- Integration switcher — only shown when both are connected -->
        <div
          class="integration-switcher"
          id="integrationSwitcher"
          style="display: none"
        >
          <a
            href="/dashboard/shopify"
            class="switcher-tab shopify-tab"
            id="shopifyTab"
            >🛍️ Shopify</a
          >
          <span class="switcher-tab active" id="squareTab">⬛ Square</span>
        </div>
        <div class="nav-tab active" data-view="overview">Overview</div>
        <div class="nav-tab" data-view="orders">Orders</div>
        <div class="nav-tab" data-view="customers">Customers</div>
        <div class="nav-tab" data-view="appointments">Appointments</div>
        <div class="nav-tab" data-view="reviews">Google Reviews</div>
      </div>
      <div class="nav-right">
        <div class="shop-badge" id="shopBadge" style="display: none">
          <span>●</span><span id="shopName">Square</span>
        </div>
        <a href="/reports" class="btn-logout" style="text-decoration: none"
          >📊 Reports</a
        >
        <a href="/intelligence" class="btn-logout" style="text-decoration: none"
          >🧠 Intelligence Center</a
        >

        <a href="/integrations" style="text-decoration: none" class="btn-logout"
          >⚙️ Integrations</a
        >
        <a href="/settings" style="text-decoration: none" class="btn-logout"
          >👤 Settings</a
        >
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <button class="btn-logout" id="logoutBtn">Log out</button>
      </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
      <div
        style="
          padding: 8px 16px 12px;
          border-bottom: 1px solid rgba(255, 255, 255, 0.05);
          margin-bottom: 8px;
        "
      >
        <div style="font-size: 11px; color: #64748b; margin-bottom: 8px">
          SWITCH DASHBOARD
        </div>
        <a
          href="/dashboard/shopify"
          id="mobileShopifySwitch"
          style="
            display: none;
            color: #60a5fa;
            font-size: 13px;
            text-decoration: none;
            padding: 4px 0;
            display: block;
          "
          >🛍️ Switch to Shopify Dashboard</a
        >
      </div>
      <div class="mobile-nav-tab active" data-view="overview">📊 Overview</div>
      <div class="mobile-nav-tab" data-view="orders">🧾 Orders</div>
      <div class="mobile-nav-tab" data-view="customers">👥 Customers</div>
      <div class="mobile-nav-tab" data-view="appointments">📅 Appointments</div>
      <div class="mobile-nav-tab" data-view="reviews">⭐ Google Reviews</div>
    </div>

    <div class="container">
      <div id="content">
        <div class="loading">
          <div class="spinner"></div>
          <div>Loading your Square dashboard...</div>
        </div>
      </div>
    </div>

    <script>
      const BACKEND_URL = "https://api.aervoapp.com";
      const token = localStorage.getItem("aervo_token");
      if (!token) window.location.href = "/login";

      let currentView = "overview";
      let userData = null;
      let merchantId = null;
      let squareData = {
        locations: [],
        orders: [],
        customers: [],
        appointments: [],
      };
      let selectedLocation = null;
      let hasShopify = false;

      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("aervo_token");
        localStorage.removeItem("aervo_user");
        window.location.href = "/login";
      });

      const mobileMenuBtn = document.getElementById("mobileMenuBtn");
      const mobileMenu = document.getElementById("mobileMenu");
      mobileMenuBtn.addEventListener("click", () =>
        mobileMenu.classList.toggle("active"),
      );

      document.querySelectorAll(".nav-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          currentView = tab.dataset.view;
          document
            .querySelectorAll(".nav-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          renderView(currentView);
        });
      });

      document.querySelectorAll(".mobile-nav-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          currentView = tab.dataset.view;
          document
            .querySelectorAll(".mobile-nav-tab, .nav-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          mobileMenu.classList.remove("active");
          renderView(currentView);
        });
      });

      async function init() {
        try {
          const res = await fetch(`${BACKEND_URL}/api/user/me`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) {
            window.location.href = "/login";
            return;
          }
          const data = await res.json();
          userData = data.user;
          merchantId = String(userData.id);
          hasShopify = !!data.shop;

          // Show switcher if both integrations connected
          if (hasShopify) {

            document.getElementById("mobileShopifySwitch").style.display =
              "block";

          // Check Square connection
          const statusRes = await fetch(
            `${BACKEND_URL}/integrations/square/status?merchantId=${merchantId}`,
            { headers: { Authorization: `Bearer ${token}` } },
          );
          const status = await statusRes.json();

          if (!status.connected) {
            renderNotConnected();
            return;
          }

          document.getElementById("shopBadge").style.display = "flex";

          await loadSquareData();
          renderView("overview");
          loadHealthScore(); // after renderView so widget exists in DOM
        } catch (err) {
          console.error("Init error:", err);
          document.getElementById("content").innerHTML =
            `<div class="empty-state" style="color:#fca5a5">Failed to load dashboard. Please refresh.</div>`;
        }

      async function loadSquareData() {
        try {
          const h = { Authorization: `Bearer ${token}` };
          const [locRes, ordRes, cusRes, apptRes] = await Promise.all([
            fetch(
              `${BACKEND_URL}/integrations/square/locations?merchantId=${merchantId}`,
              { headers: h },
            ),
            fetch(
              `${BACKEND_URL}/integrations/square/orders?merchantId=${merchantId}`,
              { headers: h },
            ),
            fetch(
              `${BACKEND_URL}/integrations/square/customers/enriched?merchantId=${merchantId}`,
            ),
            fetch(
              `${BACKEND_URL}/integrations/square/appointments?merchantId=${merchantId}`,
              { headers: h },
            ),
          ]);
          const [loc, ord, cus, appt] = await Promise.all([
            locRes.json(),
            ordRes.json(),
            cusRes.json(),
            apptRes.json(),
          ]);
          squareData.locations = loc.success ? loc.locations : [];
          squareData.orders = ord.success ? ord.orders : [];
          squareData.customers = cus.success ? cus.customers : [];
          squareData.appointments = appt.success ? appt.appointments : [];
          if (squareData.locations.length > 0)
            selectedLocation = squareData.locations[0].square_location_id;
        } catch (err) {
          console.error("Square data error:", err);
        }
      }

      function getOverviewStats() {
        const orders = squareData.orders;
        const totalRevenue =
          orders.reduce((s, o) => s + (o.total_amount || 0), 0) / 100;
        const totalOrders = orders.length;
        const avgOrderValue = totalOrders > 0 ? totalRevenue / totalOrders : 0;
        const today = new Date().toISOString().split("T")[0];
        const todayOrders = orders.filter((o) =>
          o.created_at?.startsWith(today),
        );
        const todayRevenue =
          todayOrders.reduce((s, o) => s + (o.total_amount || 0), 0) / 100;
        const noShows = squareData.appointments.filter((a) => a.no_show).length;
        const totalAppts = squareData.appointments.length;
        return {
          totalRevenue,
          totalOrders,
          avgOrderValue,
          todayOrders: todayOrders.length,
          todayRevenue,
          totalCustomers: squareData.customers.length,
          noShows,
          totalAppts,
          noShowRate:
            totalAppts > 0 ? ((noShows / totalAppts) * 100).toFixed(1) : "0",
        };
      }

      function initOrderCharts() {
        const orders = squareData.orders;
        if (orders.length === 0) return;

        const serviceCtx = document.getElementById("serviceChart");
        if (serviceCtx) {
          const serviceRevenue = {};
          orders.forEach((o) => {
            if (o.services) {

                serviceRevenue[s] += (o.total_amount || 0) / 100;
              });

            .sort((a, b) => b[1] - a[1])

          new Chart(serviceCtx, {
            type: "doughnut",

                    "#34d399",
                    "#60a5fa",
                    "#f59e0b",

      let currentCustomerSegment = "all";

      function filterCustomers(segment) {
        currentCustomerSegment = segment;
        document
          .querySelectorAll('[id^="seg-"]')
          .forEach((b) => b.classList.remove("active-filter"));
        document
          .getElementById("seg-" + segment)
          ?.classList.add("active-filter");

        const now = new Date();
        let filtered = squareData.customers.map((c) => {
          const visits = parseInt(c.visit_count || 0);
          const spend = parseFloat(c.total_spend || 0);
          const lastVisit = c.last_visit ? new Date(c.last_visit) : null;
          const daysSinceVisit = lastVisit
            ? (now - lastVisit) / (1000 * 60 * 60 * 24)
            : 999;
          const isNew =
            new Date(c.created_at) >= new Date(now - 30 * 24 * 60 * 60 * 1000);
          let seg = "regular";
          if (visits === 0) seg = "no_visits";
          else if (daysSinceVisit > 60) seg = "at_risk";
          else if (visits >= 3) seg = "loyal";
          else if (isNew) seg = "new";
          return {
            ...c,
            segment: seg,
            visits,
            spend,
            lastVisit,
            daysSinceVisit,
          };
        });

        if (segment !== "all")
          filtered = filtered.filter((c) => c.segment === segment);

        const wrapper = document.getElementById("customerTableWrapper");
        const title = document.getElementById("customerListTitle");
        if (wrapper) wrapper.innerHTML = renderCustomerTable(filtered);
        if (title) {
          const labels = {
            all: "All Customers",
            loyal: "Loyal Customers",
            at_risk: "At-Risk Customers",
            new: "New Customers",
          };
          title.textContent = `${labels[segment] || "Customers"} (${filtered.length})`;
        }
      }

      function generateInsights(
        d,
        currentRev,
        prevRev,
        revChange,
        currentOrders,
        prevOrders,
      ) {
        const insights = [];
        const now = new Date();

        // Revenue insight
        if (revChange > 10) {
          insights.push({
            priority: "low",
            label: "GREAT",
            title: `Revenue up ${revChange.toFixed(1)}% this month`,
            desc: `You made $${currentRev.toFixed(2)} this month vs $${prevRev.toFixed(2)} last month. Keep the momentum going!`,
          });
        } else if (revChange < -10) {
          insights.push({
            priority: "high",
            label: "ALERT",
            title: `Revenue down ${Math.abs(revChange).toFixed(1)}% this month`,
            desc: `You made $${currentRev.toFixed(2)} this month vs $${prevRev.toFixed(2)} last month. Consider a promotion to drive more transactions.`,
          });
        } else if (d.todayOrders === 0) {
          insights.push({
            priority: "medium",
            label: "OPPORTUNITY",
            title: "No transactions yet today",
            desc: "Consider a flash promotion or reaching out to loyal customers to drive traffic during slow periods.",
          });
        } else {
          insights.push({
            priority: "low",
            label: "INSIGHT",
            title: `${d.todayOrders} transactions today`,
            desc: `$${d.todayRevenue.toFixed(2)} in revenue so far today. You're on track!`,
          });
        }

        // Customer retention insight
        const totalCustomers = squareData.customers.length;
        const customersWithVisits = squareData.customers.filter(
          (c) => parseInt(c.visit_count || 0) > 1,
        ).length;
        const retentionRate =
          totalCustomers > 0 ? (customersWithVisits / totalCustomers) * 100 : 0;
        if (retentionRate < 20) {
          insights.push({
            priority: "high",
            label: "RETENTION",
            title: `Only ${retentionRate.toFixed(0)}% of customers return`,
            desc: "Focus on follow-up messages, loyalty programs, and personalized offers to bring customers back.",
          });
        } else if (retentionRate >= 40) {
          insights.push({
            priority: "low",
            label: "GREAT",
            title: `${retentionRate.toFixed(0)}% customer retention rate`,
            desc: "Strong repeat business! Consider a referral program to grow your customer base further.",
          });
        } else {
          insights.push({
            priority: "medium",
            label: "OPPORTUNITY",
            title: `${retentionRate.toFixed(0)}% of customers have returned`,
            desc: "There is room to improve retention. Try a follow-up message after each visit to bring customers back.",
          });
        }

        // Google Reviews tip
        insights.push({
          priority: "low",
          label: "TIP",
          title: "Responding to reviews builds trust",
          desc: "Businesses that respond to reviews within 24h see higher customer loyalty and more repeat visits.",
        });

        return insights;
      }
      // Day of week chart

      function renderCustomers() {

        const now = new Date();
        const enriched = customers.map((c) => {
          const visits = parseInt(c.visit_count || 0);
          const spend = parseFloat(c.total_spend || 0);
          const lastVisit = c.last_visit ? new Date(c.last_visit) : null;
          const daysSinceVisit = lastVisit
            ? (now - lastVisit) / (1000 * 60 * 60 * 24)
            : 999;
          const isNew =
            new Date(c.created_at) >= new Date(now - 30 * 24 * 60 * 60 * 1000);

          let segment = "regular";
          if (visits === 0) segment = "no_visits";
          else if (daysSinceVisit > 60) segment = "at_risk";
          else if (visits >= 3) segment = "loyal";
          else if (isNew) segment = "new";

          return { ...c, segment, visits, spend, lastVisit, daysSinceVisit };

        const loyal = enriched.filter((c) => c.segment === "loyal").length;

          <td style="color:#34d399;font-weight:600">$${(c.spend / 100).toFixed(2)}</td>
          <td style="color:#9ca7d6">$${c.visits > 0 ? (c.spend / 100 / c.visits).toFixed(2) : "0.00"}</td>
          <td style="color:#64748b;font-size:12px">${c.lastVisit ? new Date(c.lastVisit).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "—"}${daysSince !== null ? `<div style="font-size:10px;color:#475569">${daysSince}d ago</div>` : ""}</td>
          <td><span style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;background:${seg.bg};color:${seg.color}">${seg.label}</span></td>
        </tr>`;
      })
      .join("")}
    </tbody>
  </table></div>`;
      }

      function initCustomerCharts() {
        const ctx = document.getElementById("segmentChart");
        if (!ctx || squareData.customers.length === 0) return;

        const now = new Date();
        let loyal = 0,
          atRisk = 0,
          newC = 0,
          regular = 0;
        squareData.customers.forEach((c) => {
          const visits = parseInt(c.visit_count || 0);
          const lastVisit = c.last_visit ? new Date(c.last_visit) : null;
          const daysSince = lastVisit
            ? (now - lastVisit) / (1000 * 60 * 60 * 24)
            : 999;
          const isNew =
            new Date(c.created_at) >= new Date(now - 30 * 24 * 60 * 60 * 1000);
          if (visits === 0) regular++;
          else if (daysSince > 60) atRisk++;
          else if (visits >= 3) loyal++;
          else if (isNew) newC++;
          else regular++;
        });

        new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: ["Loyal", "At-Risk", "New", "Regular"],
            datasets: [
              {
                data: [loyal, atRisk, newC, regular],
                backgroundColor: ["#34d399", "#ef4444", "#60a5fa", "#475569"],
                borderColor: "#0f172a",
                borderWidth: 2,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                position: "bottom",
                labels: { color: "#9ca7d6", padding: 12 },
              },
              tooltip: {
                callbacks: {
                  label: (ctx) => `${ctx.label}: ${ctx.parsed} customers`,
                },
              },
            },
          },
        });
      }

                <div class="insight-item" style="background:rgba(15,23,42,0.5);border-color:rgba(148,163,184,0.15)"><span class="insight-priority priority-medium">TIP 2</span><strong>Require deposits</strong> — A small deposit for new customers dramatically reduces no-shows.</div>

      function connectGoogleReviews() {
        const placeId = prompt(
          "Enter your Google Place ID.\n\nFind yours at: https://developers.google.com/maps/documentation/javascript/examples/places-placeid-finder",
        );
        if (!placeId) return;
        fetchGoogleReviews(placeId.trim());
      }

      async function fetchGoogleReviews(placeId) {
        document.getElementById("reviewsContent").innerHTML =
          `<div class="loading"><div class="spinner"></div><div>Fetching your Google Reviews...</div></div>`;
        try {
          const res = await fetch(
            `${BACKEND_URL}/api/square/google-reviews?placeId=${encodeURIComponent(placeId)}&merchantId=${merchantId}`,
            { headers: { Authorization: `Bearer ${token}` } },
          );
          const data = await res.json();
          if (data.success) renderReviewsData(data);
          else throw new Error(data.message || "Failed to fetch reviews");
        } catch (err) {
          document.getElementById("reviewsContent").innerHTML =
            `<div style="text-align:center;padding:40px;color:#fca5a5">Failed to load reviews: ${err.message}<br><br><button class="btn-primary" onclick="renderView('reviews')">Try Again</button></div>`;
        }
      }

        const { rating, totalReviews, reviews, aiAnalysis } = data;
        document.getElementById("reviewsContent").innerHTML = `
          <div class="grid-4" style="margin-bottom:24px">
            <div class="card" style="text-align:center"><h3>Overall Rating</h3><div class="stat-large yellow">${rating}</div><div style="font-size:20px">⭐⭐⭐⭐⭐</div><div class="stat-label">${totalReviews} reviews</div></div>
            <div class="card"><h3>Sentiment</h3><canvas id="sentimentChart" style="max-height:120px"></canvas></div>
            <div class="card"><h3>Common Themes</h3>${(aiAnalysis?.themes || []).map((t) => `<div style="padding:6px 0;border-bottom:1px solid rgba(148,163,184,0.1);font-size:13px;color:#9ca7d6">${t}</div>`).join("") || "<p style='color:#64748b'>Analyzing...</p>"}</div>
            <div class="card"><h3>Top Recommendation</h3><p style="color:#9ca7d6;font-size:13px;line-height:1.6">${aiAnalysis?.topRecommendation || "Analyzing..."}</p></div>

          <div class="card"><h3 style="margin-bottom:16px">Recent Reviews with AI Responses</h3>${(

            <div class="review-card">

              <div class="review-text">"${r.text}"</div>

                      aiAnalysis.negative || 0,

                    borderWidth: 2,

              },
              options: {
                responsive: true,

      // ── Not connected ────────────────────────────────────────────────────────
      function renderNotConnected() {
        document.getElementById("content").innerHTML = `
          <div class="card" style="text-align:center;padding:60px 24px;max-width:600px;margin:40px auto">
            <div style="font-size:64px;margin-bottom:20px">⬛</div>
            <h2 style="color:#e5ecff;margin-bottom:12px">Connect Your Square Account</h2>
            <p style="color:#9ca7d6;font-size:15px;margin-bottom:28px;line-height:1.6">Connect Square to unlock AI-powered insights for your brick-and-mortar business.</p>
            <a href="${BACKEND_URL}/integrations/square/connect?merchantId=${merchantId}" class="btn-primary">Connect Square Account</a>
          </div>`;

      // ── Chat ─────────────────────────────────────────────────────────────────
      function renderChat() {
        return `<div class="chat-container">
          <div class="chat-messages" id="chatMessages">
            <div class="chat-message ai">👋 Hi! I'm <strong>Aervo</strong>, your AI business co-pilot.<br><br>
              • <span style="color:#6ee7b7;cursor:pointer" onclick="askSuggestion(this)">What were my busiest hours this week?</span><br>
              • <span style="color:#6ee7b7;cursor:pointer" onclick="askSuggestion(this)">How can I reduce no-shows?</span><br>
              • <span style="color:#6ee7b7;cursor:pointer" onclick="askSuggestion(this)">Which items should I promote?</span>
            </div>
          </div>
          <div class="chat-input-wrapper">
            <input type="text" class="chat-input" id="chatInput" placeholder="Ask anything about your business..." />
            <button class="btn-send" onclick="sendMessage()">Send</button>
          </div>
        </div>`;
      }

      let isAIThinking = false;
      async function sendMessage() {
        if (isAIThinking) return;
        const input = document.getElementById("chatInput");
        const messages = document.getElementById("chatMessages");
        const message = input?.value?.trim();
        if (!message || !messages) return;
        const userMsg = document.createElement("div");
        userMsg.className = "chat-message user";
        userMsg.textContent = message;
        messages.appendChild(userMsg);
        input.value = "";
        messages.scrollTop = messages.scrollHeight;
        isAIThinking = true;
        const typingEl = document.createElement("div");
        typingEl.className = "chat-message ai";
        typingEl.id = "typingIndicator";
        typingEl.innerHTML =
          "<em style='color:#64748b'>Aervo is thinking...</em>";
        messages.appendChild(typingEl);
        input.disabled = true;
        try {
          const res = await fetch(`${BACKEND_URL}/api/ai/chat`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ message, merchantId, platform: "square" }),
          });
          const data = await res.json();
          document.getElementById("typingIndicator")?.remove();
          const aiMsg = document.createElement("div");
          aiMsg.className = "chat-message ai";
          aiMsg.innerHTML = (data.reply || "Sorry, I couldn't respond.")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/\n/g, "<br>");
          messages.appendChild(aiMsg);
        } catch {
          document.getElementById("typingIndicator")?.remove();
          const errMsg = document.createElement("div");
          errMsg.className = "chat-message ai";
          errMsg.textContent =
            "Sorry, I had trouble responding. Please try again.";
          messages.appendChild(errMsg);
        }
        isAIThinking = false;
        input.disabled = false;
        input.focus();
        messages.scrollTop = messages.scrollHeight;
      }

      function askSuggestion(el) {
        const input = document.getElementById("chatInput");
        if (input) {
          input.value = el.textContent;
          sendMessage();
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        document
          .getElementById("chatInput")
          ?.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
          });
      });

      init();

      // ── HEALTH SCORE ───────────────────────────────────────────────
      async function loadHealthScore() {
        try {
          console.log("Loading health score..."); // ADD
          const res = await fetch(`${BACKEND_URL}/api/health-score`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          console.log("Health score response:", data); // ADD
          if (data.success && data.score) {
            renderHealthScore(data.score);
          } else {
            calculateHealthScore();
          }
        } catch (e) {
          console.error("Health score error:", e);
        }
      }

      async function calculateHealthScore() {
        console.log("Calculating, merchantId:", merchantId);
        if (!merchantId) return;
        try {
          const res = await fetch(`${BACKEND_URL}/api/health-score/calculate`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ merchantId }),
          });
          const data = await res.json();
          console.log("Calculate response:", data);
          if (data.success) renderHealthScore(data.score, data.ai);
        } catch (e) {
          console.error("Calculate score error:", e);
        }
      }

      async function recalculateScore() {
        const btn = document.getElementById("recalcBtn");
        if (!btn) return;
        btn.textContent = "↻ Calculating...";
        btn.disabled = true;

        // Force recalculate by skipping cache
        try {
          const origin = typeof shopOrigin !== "undefined" ? shopOrigin : null;
          const merchant =
            typeof merchantId !== "undefined" ? merchantId : null;

          const body = origin
            ? { shopOrigin: origin, force: true }
            : { merchantId: merchant, force: true };

          const res = await fetch(`${BACKEND_URL}/api/health-score/calculate`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (data.success) renderHealthScore(data.score, data.ai);
        } catch (e) {
          console.error("Recalculate error:", e);
        }

        btn.textContent = "↻ Recalculate";
        btn.disabled = false;
      }

      function renderHealthScore(score, ai) {
        const s = score.score;
        const color = s >= 70 ? "#23e6a8" : s >= 40 ? "#fbbf24" : "#f87171";
        const grade =
          s >= 70
            ? "Healthy 💚"
            : s >= 40
              ? "Needs Attention ⚠️"
              : "At Risk 🔴";

        const ring = document.getElementById("scoreRing");
        const numEl = document.getElementById("scoreNumber");
        const gradeEl = document.getElementById("scoreGrade");
        const summaryEl = document.getElementById("scoreSummary");
        if (!ring || !numEl) return;

        const circumference = 264;
        const offset = circumference - (s / 100) * circumference;
        ring.style.stroke = color;
        setTimeout(() => {
          ring.style.strokeDashoffset = offset;
        }, 100);

        numEl.textContent = s;
        numEl.style.color = color;
        gradeEl.textContent = grade;
        gradeEl.style.color = color;
        summaryEl.textContent = score.summary || "";

        const breakdown = [
          { label: "Revenue", score: score.revenue_score, max: 25 },
          { label: "Orders", score: score.orders_score, max: 20 },
          { label: "Refunds", score: score.refund_score, max: 20 },
          { label: "Inventory", score: score.inventory_score, max: 20 },
          { label: "Retention", score: score.retention_score, max: 15 },
        ];

        const breakdownEl = document.getElementById("scoreBreakdown");
        if (breakdownEl) {
          breakdownEl.innerHTML = breakdown
            .map((b) => {
              const pct = (b.score / b.max) * 100;
              const c =
                pct >= 70 ? "#23e6a8" : pct >= 40 ? "#fbbf24" : "#f87171";
              return `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <div style="font-size:12px;color:#6b7a99;width:65px;">${b.label}</div>
          <div style="flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:${c};border-radius:999px;transition:width 1s;"></div>
          </div>
          <div style="font-size:11px;color:#9aa8c8;width:30px;text-align:right;">${b.score}/${b.max}</div>
        </div>
      `;
            })
            .join("");
        }

        let improvements = [];
        try {
          const parsed =
            typeof score.improvements === "string"
              ? JSON.parse(score.improvements)
              : score.improvements;
          improvements = parsed.improvements || [];
        } catch (e) {}
        if (ai?.improvements) improvements = ai.improvements;

        const impEl = document.getElementById("scoreImprovements");
        if (impEl) {
          impEl.innerHTML = improvements
            .map(
              (imp) => `
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;">
        <span style="color:#f87171;font-size:12px;margin-top:1px;">→</span>
        <span style="font-size:12px;color:#9aa8c8;line-height:1.5;">${imp}</span>
      </div>
    `,
            )
            .join("");
        }
      }
    </script>
